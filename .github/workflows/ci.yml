name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Node dependencies
        run: npm ci

      - name: Set NX_BASE and NX_HEAD
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "NX_BASE=origin/${{ github.base_ref }}" >> $GITHUB_ENV
            echo "NX_HEAD=${{ github.sha }}"             >> $GITHUB_ENV
          else
            echo "NX_BASE=${{ github.event.before }}"   >> $GITHUB_ENV
            echo "NX_HEAD=${{ github.sha }}"             >> $GITHUB_ENV
          fi

      - name: Sync affected Python envs
        run: npx nx affected -t sync --base=$NX_BASE --head=$NX_HEAD --parallel=4

      - name: Lint affected
        run: npx nx affected -t lint --base=$NX_BASE --head=$NX_HEAD --parallel=4

      - name: Verify wheel-bundled package versions are bumped on source changes
        run: python3 scripts/check_wheel_versions.py --base=$NX_BASE --head=$NX_HEAD

      # Repo-shape contract checks: target-shape, watch-mode test drift,
      # rendered app.yaml against deploy.toml. Documented in
      # docs/architecture/repo-consolidation.md as the source-of-truth
      # health command.
      - name: check:repo
        run: npm run check:repo

      # Frontend design-system audit: --strict fails the build on any
      # @carbon/* import (forbidden by frontend_rules.md). Tailwind usage
      # is reported as a warning until the SPC migration question is
      # answered (see TODO.md).
      - name: audit:frontend (strict — Carbon forbidden)
        run: npm run audit:frontend:strict

      # Central DDD guardrail. Pre-commit also runs this, but a forked PR or
      # a contributor who skips hooks would otherwise bypass it. The test
      # AST-walks every domain/, application/, and router*.py file across all
      # apps and enforces the bounded-context allowlist; not part of the per-
      # app `nx test` graph because it lives at scripts/tests/.
      - name: DDD architecture guardrails
        run: uv run --with pytest pytest scripts/tests/test_ddd_architecture_guardrails.py --tb=short

      # Docstring presence gate. Each pyproject.toml has a [tool.interrogate]
      # block with fail-under set at the current floor (see TODO.md ratchet
      # entry). Regression below that floor fails CI; ratchet up sprint by
      # sprint as the team adds docstrings.
      - name: Docstring presence (interrogate)
        run: |
          uv tool install interrogate
          set -e
          for cfg in apps/connectedquality/backend apps/envmon/backend \
                     apps/processorderhistory/backend apps/spc/backend \
                     apps/trace2/backend apps/warehouse360/backend \
                     libs/shared-api libs/shared-auth libs/shared-db libs/shared-domain; do
            echo "::group::interrogate $cfg"
            uv tool run interrogate --config "$cfg/pyproject.toml" "$cfg"
            echo "::endgroup::"
          done

      - name: Typecheck affected frontends
        run: npx nx affected -t typecheck --base=$NX_BASE --head=$NX_HEAD --parallel=4

      - name: Test affected
        run: npx nx affected -t test --base=$NX_BASE --head=$NX_HEAD --parallel=4

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            apps/*/backend/coverage.xml
            apps/*/frontend/coverage/
          retention-days: 14

      - name: Build affected frontends
        run: npx nx affected -t build --base=$NX_BASE --head=$NX_HEAD --parallel=4

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      # ----- Python: known-CVE scan via pip-audit ---------------------------
      # `uv sync` resolves and installs the workspace into a single venv that
      # covers every backend and shared lib. `uv run --with pip-audit` runs
      # pip-audit *inside* that env so we audit the actually-resolved
      # dependency tree (`uv tool run` would isolate pip-audit and miss the
      # project deps entirely).
      - name: pip-audit (Python dependencies)
        run: |
          uv sync --all-extras
          uv run --with pip-audit pip-audit --strict

      # ----- JavaScript: known-CVE scan via npm audit ----------------------
      # Workspace-aware; --workspaces flag would also work but the root audit
      # already walks the npm workspaces declared in package.json.
      - name: Install Node dependencies
        run: npm ci

      - name: npm audit (JavaScript dependencies)
        run: npm audit --audit-level=high

      # ----- Secret scanning via gitleaks ----------------------------------
      # Catches accidentally-committed credentials. Runs against the full
      # history on push to main (so a sneaky commit is found post-merge too)
      # and against the diff on PRs (faster, scoped to what changed).
      - name: gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----- SAST: GitHub CodeQL ------------------------------------------
      # Two languages — python for the FastAPI/uvicorn backends and the build
      # scripts; javascript covers all the frontend SPAs.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python,javascript"

  deploy:
    needs: [ci, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: databricks/setup-cli@main

      - name: Install Node dependencies
        run: npm ci

      - name: Set NX_BASE
        run: |
          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            echo "NX_BASE=HEAD~1" >> $GITHUB_ENV
          else
            echo "NX_BASE=${{ github.event.before }}" >> $GITHUB_ENV
          fi

      - name: Deploy affected Databricks apps
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          npx nx affected -t deploy \
            --base=$NX_BASE \
            --head=${{ github.sha }}

