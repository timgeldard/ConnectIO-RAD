repos:
  - repo: local
    hooks:
      - id: validate-i18n
        name: Validate i18n
        entry: python3 scripts/validate_i18n.py
        language: system
        files: ^apps/.*/i18n/resources\.json$
        pass_filenames: false
      - id: ddd-guardrails
        name: DDD Architecture Guardrails
        # Runs the central guardrail at scripts/tests/, which AST-walks every
        # domain/, application/, and router*.py file across all apps and
        # enforces the four-layer DDD rules plus the bounded-context allowlist.
        # This is broader than the per-app tests AND avoids the conftest.py
        # name-collision that running multiple apps' test trees in one pytest
        # invocation triggers; per-app tests still run under `nx affected -t
        # test` in CI.
        entry: python -m pytest --tb=short -v scripts/tests/test_ddd_architecture_guardrails.py
        language: system
        pass_filenames: false
        files: ^(apps|libs|scripts/tests)/.*\.py$
        stages: [pre-commit]
