repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # NOTE: when bumping ruff, run `uvx ruff@<new> check .` locally first;
    # newer ruff versions enable additional rule categories by default that
    # may surface latent violations. Pin tracks the version proven clean
    # against the current codebase.
    rev: v0.13.3
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [typescript, javascript, tsx, jsx, json, css]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^apps/.*/app\.yaml$  # app.yaml is generated; not valid standalone
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: validate-i18n
        name: Validate i18n
        entry: python3 scripts/validate_i18n.py
        language: system
        files: ^apps/.*/i18n/resources\.json$
        pass_filenames: false
      - id: python-architecture-lint
        name: Python Architecture Lint
        entry: npm run lint:architecture:python
        language: system
        pass_filenames: false
        files: ^(apps|libs|\.importlinter|package\.json)
        stages: [pre-commit]
      - id: typescript-architecture-lint
        name: TypeScript Architecture Lint
        entry: npm run lint:architecture:ts
        language: system
        pass_filenames: false
        files: ^(apps/.*/frontend|libs/shared-.*/src|eslint\.config\.mjs|package\.json|nx\.json)
        stages: [pre-commit]
      - id: validate-template-app
        name: Validate generated template app
        entry: python3 scripts/validate_new_app.py template
        language: system
        pass_filenames: false
        files: ^(apps/template|apps/platform/frontend/src/shell/module-manifest\.json|scripts/validate_new_app\.py)
        stages: [pre-commit]
      - id: generator-tests
        name: Rapid New Module generator tests
        entry: npm run test:generators
        language: system
        pass_filenames: false
        files: ^(tools/generators|tests/tools/generators|package\.json)
        stages: [pre-commit]
