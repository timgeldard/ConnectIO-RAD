repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [typescript, javascript, tsx, jsx, json, css]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^apps/.*/app\.yaml$  # app.yaml is generated; not valid standalone
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: validate-i18n
        name: Validate i18n
        entry: python3 scripts/validate_i18n.py
        language: system
        files: ^apps/.*/i18n/resources\.json$
        pass_filenames: false
      - id: ddd-guardrails
        name: DDD Architecture Guardrails
        # Runs the central guardrail at scripts/tests/, which AST-walks every
        # domain/, application/, and router*.py file across all apps and
        # enforces the four-layer DDD rules plus the bounded-context allowlist.
        # This is broader than the per-app tests AND avoids the conftest.py
        # name-collision that running multiple apps' test trees in one pytest
        # invocation triggers; per-app tests still run under `nx affected -t
        # test` in CI.
        entry: python -m pytest --tb=short -v scripts/tests/test_ddd_architecture_guardrails.py
        language: system
        pass_filenames: false
        files: ^(apps|libs|scripts/tests)/.*\.py$
        stages: [pre-commit]
      - id: validate-template-app
        name: Validate generated template app
        entry: python3 scripts/validate_new_app.py template
        language: system
        pass_filenames: false
        files: ^(apps/template|apps/platform/frontend/src/shell/module-manifest\.json|scripts/validate_new_app\.py)
        stages: [pre-commit]
      - id: generator-tests
        name: Rapid New Module generator tests
        entry: npm run test:generators
        language: system
        pass_filenames: false
        files: ^(tools/generators|tests/tools/generators|package\.json)
        stages: [pre-commit]
