# =============================================================================
# SEMANTIC MODEL — APPROVED ENTITY DEFINITIONS
# =============================================================================
#
# This file is the single source of truth for every data object that agents
# are permitted to use.  If an object is NOT listed here, agents MUST NOT
# reference it.
#
# Catalog placeholder: {{CATALOG}}   (resolved per environment)
# Schema:              gold
#
# Tier key:
#   APPROVED    — agent may query freely
#   RESTRICTED  — agent may query only with explicit human instruction
#   DEPRECATED  — do not use; listed for migration awareness only
#
# Last reviewed: 2026-04-23
# =============================================================================

catalog: "{{CATALOG}}"
schema: gold

entities:

  # ---------------------------------------------------------------------------
  # DIMENSION: gold_material
  # ---------------------------------------------------------------------------
  - name: gold_material
    business_name: Material Master
    type: dimension
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Canonical material dimension containing product descriptions, material
      group, material type, base unit of measure, and gross weight.  Sourced
      from SAP MARA / MAKT.  Multi-language — always filter LANGUAGE_ID for
      the desired locale.
    grain: One row per (MATERIAL_ID, LANGUAGE_ID)
    primary_keys: [MATERIAL_ID, LANGUAGE_ID]
    preferred_synonyms:
      - material
      - product
      - SKU
      - item
      - matnr
    important_dimensions:
      - name: MATERIAL_ID
        type: STRING
        description: SAP material number, 18-char, leading-zero-padded
        example: "000000000020582002"
      - name: LANGUAGE_ID
        type: STRING
        description: "Language key for description (E = English, D = German, etc.)"
        example: "E"
      - name: MATERIAL_NAME
        type: STRING
        description: Material short text in the given language (max 40 chars)
        example: "PRT1519 PRE-COOK NUGGET 25KG"
      - name: MATERIAL_GROUP
        type: STRING
        description: SAP material group classification code
      - name: MATERIAL_TYPE
        type: STRING
        description: "SAP material type (FERT = finished, ROH = raw, HALB = semi-finished, VERP = packaging)"
      - name: BASE_UOM
        type: STRING
        description: Base unit of measure (KG, L, EA, PAL, etc.)
      - name: GROSS_WEIGHT
        type: DECIMAL(13,3)
        description: Gross weight per base unit
    important_measures: []
    forbidden_usage:
      - "NEVER cast MATERIAL_ID to INTEGER — it has leading zeros"
      - "NEVER omit the LANGUAGE_ID filter — you will get duplicate rows per language"
    common_questions:
      - "What is the description for material X?"
      - "Which materials belong to material group Y?"
      - "What is the base unit of measure for material X?"
    traps:
      - "Always filter LANGUAGE_ID = 'E' for English unless the user requests another language"
      - "Some materials lack an English description — use COALESCE(MATERIAL_NAME, MATERIAL_ID)"
      - "MATERIAL_TYPE codes are SAP internal — see sap_code_meanings.md for translations"

  # ---------------------------------------------------------------------------
  # DIMENSION: gold_plant
  # ---------------------------------------------------------------------------
  - name: gold_plant
    business_name: Plant Master
    type: dimension
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Plant/site dimension with plant name, country, region, and company code.
      Sourced from SAP T001W.
    grain: One row per PLANT_ID
    primary_keys: [PLANT_ID]
    preferred_synonyms:
      - plant
      - site
      - factory
      - facility
      - werk
    important_dimensions:
      - name: PLANT_ID
        type: STRING
        description: SAP 4-character plant code
        example: "C351"
      - name: PLANT_NAME
        type: STRING
        description: Human-readable plant name
        example: "Olesnica [MFG]"
      - name: COUNTRY_ID
        type: STRING
        description: ISO 2-letter country code
        example: "PL"
      - name: REGION
        type: STRING
        description: "Business region (EMEA, APAC, Americas)"
      - name: COMPANY_CODE
        type: STRING
        description: SAP company code (4-char)
    important_measures: []
    forbidden_usage:
      - "NEVER cast PLANT_ID to INTEGER"
    common_questions:
      - "Which plants are in EMEA?"
      - "What is the name of plant C351?"
    traps:
      - "PLANT_NAME may include suffixes like [MFG], [DC], [LAB] indicating site type"

  # ---------------------------------------------------------------------------
  # FACT: gold_batch_lineage
  # ---------------------------------------------------------------------------
  - name: gold_batch_lineage
    business_name: Batch Lineage
    type: fact
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Batch-to-batch traceability graph.  Each row is a directed edge from a
      parent (input) batch to a child (output) batch, linked through a
      production order, batch transfer, or stock transport order.  This is the
      core table for forward trace (where did it go?) and reverse trace (where
      did it come from?).  Sourced from SAP CHVW and process order component
      lists.
    grain: One edge per (PARENT_MATERIAL_ID, PARENT_BATCH_ID, CHILD_MATERIAL_ID, CHILD_BATCH_ID, LINK_TYPE)
    primary_keys: [PARENT_MATERIAL_ID, PARENT_BATCH_ID, CHILD_MATERIAL_ID, CHILD_BATCH_ID, LINK_TYPE]
    preferred_synonyms:
      - lineage
      - traceability
      - genealogy
      - batch tree
      - where-used
    important_dimensions:
      - name: PARENT_MATERIAL_ID
        type: STRING
        description: Material number of the input (consumed) batch
      - name: PARENT_BATCH_ID
        type: STRING
        description: Batch number of the input batch
      - name: PARENT_PLANT_ID
        type: STRING
        description: Plant where the parent batch was held
      - name: CHILD_MATERIAL_ID
        type: STRING
        description: Material number of the output (produced) batch
      - name: CHILD_BATCH_ID
        type: STRING
        description: Batch number of the output batch
      - name: CHILD_PLANT_ID
        type: STRING
        description: Plant where the child batch was produced
      - name: LINK_TYPE
        type: STRING
        description: "Edge type: PRODUCTION | BATCH_TRANSFER | STO_TRANSFER"
      - name: PROCESS_ORDER_ID
        type: STRING
        description: Process order that created the link (NULL for transfers)
      - name: LINK_DATE
        type: DATE
        description: Date the lineage edge was created (goods movement date)
    important_measures: []
    forbidden_usage:
      - "NEVER traverse lineage without WITH RECURSIVE — plain CTEs cannot self-reference"
      - "NEVER omit cycle detection — data can contain circular references from reversals"
      - "NEVER assume CHILD_BATCH_ID is non-null — filter explicitly"
    common_questions:
      - "Where did batch X end up? (forward trace)"
      - "What raw materials went into batch X? (reverse trace)"
      - "Which customers are exposed if batch X is recalled?"
      - "How many downstream batches does batch X feed?"
    traps:
      - "Always SELECT DISTINCT edges before recursive traversal — duplicates exist from multiple extraction loads"
      - "LINK_TYPE filtering is critical: use PRODUCTION for BOM-level tracing, include BATCH_TRANSFER for full graph"
      - "CHILD_BATCH_ID can be NULL for scrap/waste outputs — always filter IS NOT NULL unless analysing waste"
      - "Use path-tracking string concatenation for cycle detection in recursive CTEs"

  # ---------------------------------------------------------------------------
  # FACT: gold_inventory_movement
  # ---------------------------------------------------------------------------
  - name: gold_inventory_movement
    business_name: Inventory Movement
    type: fact
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Every goods movement (receipt, issue, transfer, adjustment) for batch-
      managed materials.  One row per document line.  Sourced from SAP MSEG /
      MKPF.  Use for mass balance, inventory history, and movement analytics.
    grain: One row per (MATERIAL_DOCUMENT_ID, MATERIAL_DOCUMENT_ITEM)
    primary_keys: [MATERIAL_DOCUMENT_ID, MATERIAL_DOCUMENT_ITEM]
    preferred_synonyms:
      - movement
      - goods movement
      - stock movement
      - inventory transaction
      - material movement
    important_dimensions:
      - name: MATERIAL_ID
        type: STRING
        description: Material number
      - name: BATCH_ID
        type: STRING
        description: Batch number
      - name: PLANT_ID
        type: STRING
        description: Plant where movement occurred
      - name: STORAGE_LOCATION
        type: STRING
        description: Storage location within plant
      - name: MOVEMENT_TYPE
        type: STRING
        description: SAP 3-digit movement type code (see sap_code_meanings.md)
        example: "101"
      - name: MOVEMENT_CATEGORY
        type: STRING
        description: "Derived human-readable category: Production, Shipment, Consumption, Transfer, Adjustment"
      - name: POSTING_DATE
        type: DATE
        description: Date the movement was posted in SAP
      - name: PROCESS_ORDER_ID
        type: STRING
        description: Production order (for 101/261 movements)
      - name: CUSTOMER_ID
        type: STRING
        description: Ship-to customer (for 601 delivery movements)
      - name: DELIVERY_ID
        type: STRING
        description: Delivery document number (for shipments)
      - name: MATERIAL_DOCUMENT_ID
        type: STRING
        description: Material document number
      - name: MATERIAL_DOCUMENT_ITEM
        type: STRING
        description: Line item within the material document
    important_measures:
      - name: MOVEMENT_QTY
        type: DECIMAL(23,3)
        description: Signed quantity (positive = receipt, negative = issue)
      - name: ABS_QTY
        type: DECIMAL(23,3)
        description: Absolute (unsigned) movement quantity
      - name: MOVEMENT_UOM
        type: STRING
        description: Unit of measure for this movement
    forbidden_usage:
      - "NEVER sum MOVEMENT_QTY across different UOMs without conversion"
      - "NEVER include STO movements (641/642) in mass balance without understanding they appear twice (issue + receipt)"
    common_questions:
      - "What is the production volume this week?"
      - "Show inventory movements for batch X"
      - "How much was shipped to customer Y last month?"
      - "What is the mass balance for batch X?"
      - "Show all scrap/adjustment movements"
    traps:
      - "Use ABS_QTY for volume summaries — MOVEMENT_QTY carries the sign"
      - "Use MOVEMENT_QTY for running balance calculations"
      - "Exclude STO transfers (MOVEMENT_CATEGORY LIKE 'STO%') from single-site mass balance"
      - "Deliveries can appear as both 601 (shipment) and 641 (STO) — clarify with user"
      - "POSTING_DATE is the SAP posting date, not necessarily the physical movement date"

  # ---------------------------------------------------------------------------
  # FACT: gold_process_order
  # ---------------------------------------------------------------------------
  - name: gold_process_order
    business_name: Process Order
    type: fact
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Production/process order header.  One row per order.  Contains planned
      and actual dates, quantities, status, and the material being produced.
      Sourced from SAP AUFK / AFKO / AFPO.  Core entity for schedule
      adherence, cycle time, and production planning analytics.
    grain: One row per ORDER_ID
    primary_keys: [ORDER_ID]
    preferred_synonyms:
      - process order
      - production order
      - manufacturing order
      - work order
      - aufnr
    important_dimensions:
      - name: ORDER_ID
        type: STRING
        description: SAP process/production order number (12-char)
        example: "007006276688"
      - name: ORDER_TYPE
        type: STRING
        description: "SAP order type (PP01 = process, PI01 = PI sheet, etc.)"
      - name: MATERIAL_ID
        type: STRING
        description: Material being produced
      - name: PLANT_ID
        type: STRING
        description: Production plant
      - name: PRODUCTION_LINE
        type: STRING
        description: Work centre or production line identifier
      - name: ORDER_STATUS
        type: STRING
        description: "Current status: CREATED, RELEASED, STARTED, CONFIRMED, CLOSED, DELETED"
      - name: PLANNED_START_DATE
        type: DATE
        description: Scheduled start date
      - name: PLANNED_END_DATE
        type: DATE
        description: Scheduled finish date
      - name: ACTUAL_START_DATE
        type: DATE
        description: Actual production start (first confirmation)
      - name: ACTUAL_END_DATE
        type: DATE
        description: Actual production finish (final confirmation)
    important_measures:
      - name: PLANNED_QTY
        type: DECIMAL(23,3)
        description: Target output quantity
      - name: CONFIRMED_QTY
        type: DECIMAL(23,3)
        description: Actual confirmed output quantity
      - name: SCRAP_QTY
        type: DECIMAL(23,3)
        description: Reported scrap quantity
      - name: PLANNED_DURATION_HRS
        type: DECIMAL(10,2)
        description: Planned production duration in hours
      - name: ACTUAL_DURATION_HRS
        type: DECIMAL(10,2)
        description: Actual production duration in hours
    forbidden_usage:
      - "NEVER include DELETED orders in KPI calculations — always filter ORDER_STATUS != 'DELETED'"
      - "NEVER compare PLANNED_QTY to CONFIRMED_QTY without checking that the order is CONFIRMED or CLOSED"
    common_questions:
      - "How many orders were completed on time this week?"
      - "What is the average cycle time per production line?"
      - "Which orders are overdue?"
      - "What was the planned vs actual output for order X?"
    traps:
      - "ACTUAL_END_DATE is NULL for orders not yet completed — filter ORDER_STATUS IN ('CONFIRMED','CLOSED') for completion analysis"
      - "SCRAP_QTY is cumulative — do not double-count across confirmations"
      - "One order can produce into multiple batches — join to gold_batch_lineage for batch-level detail"

  # ---------------------------------------------------------------------------
  # METRIC VIEW: metric_oee_daily
  # ---------------------------------------------------------------------------
  - name: metric_oee_daily
    business_name: Daily OEE
    type: metric_view
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Pre-calculated daily Overall Equipment Effectiveness per production line
      per plant.  OEE = Availability × Performance × Quality.  Built from
      process order confirmations, downtime logs, and quality results.
      Refreshed daily.
    grain: One row per (PLANT_ID, PRODUCTION_LINE, PRODUCTION_DATE)
    primary_keys: [PLANT_ID, PRODUCTION_LINE, PRODUCTION_DATE]
    preferred_synonyms:
      - OEE
      - equipment effectiveness
      - line efficiency
    important_dimensions:
      - name: PLANT_ID
        type: STRING
        description: Plant code
      - name: PRODUCTION_LINE
        type: STRING
        description: Work centre / production line identifier
      - name: PRODUCTION_DATE
        type: DATE
        description: Calendar date of production
    important_measures:
      - name: AVAILABILITY_PCT
        type: DECIMAL(5,2)
        description: "(Scheduled Time - Downtime) / Scheduled Time × 100"
      - name: PERFORMANCE_PCT
        type: DECIMAL(5,2)
        description: "(Actual Output / Theoretical Max Output) × 100"
      - name: QUALITY_PCT
        type: DECIMAL(5,2)
        description: "(Good Units / Total Units Produced) × 100"
      - name: OEE_PCT
        type: DECIMAL(5,2)
        description: "Availability × Performance × Quality / 10000 (result is 0–100)"
      - name: SCHEDULED_MINUTES
        type: DECIMAL(10,2)
        description: Total scheduled production minutes for the day
      - name: DOWNTIME_MINUTES
        type: DECIMAL(10,2)
        description: Total unplanned downtime minutes
      - name: TOTAL_UNITS_PRODUCED
        type: DECIMAL(15,3)
        description: All units produced (good + defect)
      - name: GOOD_UNITS_PRODUCED
        type: DECIMAL(15,3)
        description: Units passing quality on first pass
    forbidden_usage:
      - "NEVER recalculate OEE from components — use the pre-calculated OEE_PCT column"
      - "NEVER average OEE_PCT across lines without weighting by SCHEDULED_MINUTES"
    common_questions:
      - "What is OEE for line X this week?"
      - "Which lines have OEE below 65%?"
      - "What is the OEE trend for plant C351?"
      - "What is driving low OEE — availability, performance, or quality?"
    traps:
      - "OEE components are percentages (0–100), not fractions (0–1)"
      - "Weighted average OEE = SUM(OEE_PCT × SCHEDULED_MINUTES) / SUM(SCHEDULED_MINUTES)"
      - "Days with zero SCHEDULED_MINUTES should be excluded (no production planned)"
      - "OEE above 85% is generally considered world-class in food manufacturing"

  # ---------------------------------------------------------------------------
  # METRIC VIEW: metric_schedule_adherence
  # ---------------------------------------------------------------------------
  - name: metric_schedule_adherence
    business_name: Schedule Adherence
    type: metric_view
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Order-level schedule adherence.  One row per completed process order,
      comparing planned vs actual completion date and planned vs actual
      quantity.  Sourced from gold_process_order with completion logic applied.
    grain: One row per ORDER_ID (completed orders only)
    primary_keys: [ORDER_ID]
    preferred_synonyms:
      - schedule adherence
      - on-time delivery
      - OTIF
      - on-time completion
    important_dimensions:
      - name: ORDER_ID
        type: STRING
        description: Process order number
      - name: MATERIAL_ID
        type: STRING
        description: Produced material
      - name: PLANT_ID
        type: STRING
        description: Production plant
      - name: PRODUCTION_LINE
        type: STRING
        description: Production line
      - name: PLANNED_END_DATE
        type: DATE
        description: Originally scheduled completion date
      - name: ACTUAL_END_DATE
        type: DATE
        description: Actual completion date
    important_measures:
      - name: PLANNED_QTY
        type: DECIMAL(23,3)
        description: Planned production quantity
      - name: CONFIRMED_QTY
        type: DECIMAL(23,3)
        description: Actual confirmed quantity
      - name: IS_ON_TIME
        type: BOOLEAN
        description: "TRUE if ACTUAL_END_DATE <= PLANNED_END_DATE"
      - name: IS_IN_FULL
        type: BOOLEAN
        description: "TRUE if CONFIRMED_QTY >= 0.95 × PLANNED_QTY (within 5% tolerance)"
      - name: IS_OTIF
        type: BOOLEAN
        description: "TRUE if both IS_ON_TIME and IS_IN_FULL are TRUE"
      - name: DELAY_DAYS
        type: INT
        description: "DATEDIFF(ACTUAL_END_DATE, PLANNED_END_DATE) — positive = late"
      - name: QTY_VARIANCE_PCT
        type: DECIMAL(7,2)
        description: "((CONFIRMED_QTY - PLANNED_QTY) / PLANNED_QTY) × 100"
    forbidden_usage:
      - "NEVER include orders with ORDER_STATUS = 'DELETED' or 'CREATED' — only completed orders"
      - "NEVER calculate schedule adherence rate without filtering to the correct date window"
    common_questions:
      - "What percentage of orders were on time this month?"
      - "Which plant has the best schedule adherence?"
      - "What is the average delay for late orders?"
      - "What is the OTIF rate by production line?"
    traps:
      - "This view contains only CONFIRMED or CLOSED orders — in-progress orders are excluded"
      - "IS_IN_FULL uses a 5% tolerance — an order delivering 96% of planned qty is 'in full'"
      - "Aggregate adherence = SUM(IS_ON_TIME::INT) / COUNT(*) — not AVG(IS_ON_TIME)"

  # ---------------------------------------------------------------------------
  # METRIC VIEW: metric_quality_yield
  # ---------------------------------------------------------------------------
  - name: metric_quality_yield
    business_name: Quality Yield
    type: metric_view
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      First-pass quality yield per batch and aggregatable by material, plant,
      and production line.  Measures the ratio of good output to total output
      on the first inspection — without rework.  Sourced from process order
      confirmations and quality inspection results.
    grain: One row per (ORDER_ID, BATCH_ID)
    primary_keys: [ORDER_ID, BATCH_ID]
    preferred_synonyms:
      - quality yield
      - first pass yield
      - FPY
      - right first time
      - RFT
    important_dimensions:
      - name: ORDER_ID
        type: STRING
        description: Process order
      - name: BATCH_ID
        type: STRING
        description: Produced batch
      - name: MATERIAL_ID
        type: STRING
        description: Produced material
      - name: PLANT_ID
        type: STRING
        description: Production plant
      - name: PRODUCTION_LINE
        type: STRING
        description: Production line
      - name: PRODUCTION_DATE
        type: DATE
        description: Date of production (goods receipt date)
    important_measures:
      - name: TOTAL_QTY
        type: DECIMAL(23,3)
        description: Total quantity produced (good + defect + scrap)
      - name: GOOD_QTY
        type: DECIMAL(23,3)
        description: Quantity passing all quality checks on first inspection
      - name: DEFECT_QTY
        type: DECIMAL(23,3)
        description: Quantity requiring rework or downgrade
      - name: SCRAP_QTY
        type: DECIMAL(23,3)
        description: Quantity scrapped (unrecoverable)
      - name: YIELD_PCT
        type: DECIMAL(5,2)
        description: "(GOOD_QTY / TOTAL_QTY) × 100"
      - name: INSPECTION_RESULT
        type: STRING
        description: "Overall batch result: ACCEPTED, REJECTED, CONDITIONAL"
    forbidden_usage:
      - "NEVER recalculate YIELD_PCT — use the pre-calculated column"
      - "NEVER include batches with TOTAL_QTY = 0 in yield aggregations (division by zero)"
    common_questions:
      - "What is the first pass yield this month?"
      - "Which materials have yield below 95%?"
      - "What is the yield trend for plant C351?"
      - "How much scrap was generated last week?"
    traps:
      - "Weighted average yield = SUM(GOOD_QTY) / SUM(TOTAL_QTY) × 100 — NOT AVG(YIELD_PCT)"
      - "Zero-production rows (TOTAL_QTY = 0) should be excluded from all yield calculations"
      - "CONDITIONAL inspection result means the batch was released with deviations — count as GOOD for yield but flag for reporting"

  # ===========================================================================
  # ENVMON APP
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # FACT: gold_inspection_lot
  # ---------------------------------------------------------------------------
  - name: gold_inspection_lot
    business_name: Inspection Lot
    type: fact
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      SAP QM inspection lot header records. Each row is one inspection lot
      created against a batch or process order. Sourced from SAP QALS via
      the gold layer. Core entity for environmental monitoring and QM analytics.
    grain: One row per (INSPECTION_LOT_ID)
    primary_keys: [INSPECTION_LOT_ID]
    preferred_synonyms:
      - inspection lot
      - lot
      - QM lot
      - prueflos
    important_dimensions:
      - name: INSPECTION_LOT_ID
        type: STRING
        description: SAP inspection lot number (12-char)
        example: "040000012345"
      - name: MATERIAL_ID
        type: STRING
        description: Material number of the inspected item
      - name: BATCH_ID
        type: STRING
        description: Batch number
      - name: PLANT_ID
        type: STRING
        description: SAP plant code
      - name: INSPECTION_TYPE
        type: STRING
        description: "SAP inspection type (01 = goods receipt, 04 = production, 08/09 = recurring)"
      - name: PROCESS_ORDER_ID
        type: STRING
        description: Process order that triggered the lot
      - name: CREATED_DATE
        type: DATE
        description: Lot creation date
      - name: INSPECTION_END_DATE
        type: DATE
        description: Date inspection was closed (NULL if still open)
      - name: INSPECTION_SHORT_TEXT
        type: STRING
        description: Free-text description of the inspection lot
      - name: USAGE_DECISION_LONG_TEXT
        type: STRING
        description: Long text from the usage decision (UD) — may contain QM engineer notes
    traps:
      - "MATERIAL_ID appears twice in the schema (duplicate column from join) — use the first occurrence"
      - "PLANT_ID also appears twice — same issue"
      - "GROUP_COUNTER_ID is the composite PK in the underlying SAP table but INSPECTION_LOT_ID is sufficient for most queries"
      - "Filter on INSPECTION_TYPE to distinguish goods receipt (01) from recurring/env monitoring (08/09) lots"
    notes:
      - "Join to gold_inspection_point on INSPECTION_LOT_ID for characteristic-level detail"
      - "Join to gold_batch_quality_result_v on INSPECTION_LOT_ID for MIC results"

  # ---------------------------------------------------------------------------
  # FACT: gold_inspection_point
  # ---------------------------------------------------------------------------
  - name: gold_inspection_point
    business_name: Inspection Point
    type: fact
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Inspection point records tied to inspection lots. Each row represents a
      sample point or functional location within a lot. Critical for
      environmental monitoring — the FUNCTIONAL_LOCATION column maps sample
      points to physical locations on a floor plan.
    grain: One row per (INSPECTION_LOT_ID, INSPECTION_POINT_ID)
    primary_keys: [INSPECTION_LOT_ID, INSPECTION_POINT_ID]
    preferred_synonyms:
      - inspection point
      - sample point
      - monitoring point
    important_dimensions:
      - name: INSPECTION_LOT_ID
        type: STRING
        description: Parent inspection lot
      - name: INSPECTION_POINT_ID
        type: STRING
        description: Unique point within the lot
      - name: INSPECTION_OPERATION_ID
        type: STRING
        description: Operation (routing step) within the lot
      - name: OPERATION_ID
        type: STRING
        description: Current node number from order counter
      - name: SAMPLE_ID
        type: STRING
        description: Sample number based on the inspection point
      - name: FUNCTIONAL_LOCATION
        type: STRING
        description: "SAP functional location (TPLNR) — links to em_location_coordinates for floor plan rendering"
        example: "Q225-0101-SEV3-Z0-72"
      - name: SAMPLE_HOUR
        type: STRING
        description: Time-of-day user field for the sample (HH:MM format)
      - name: CREATED_DATE
        type: DATE
        description: Point creation date
    traps:
      - "FUNCTIONAL_LOCATION can be NULL for lots not tied to a physical location"
      - "USER_FIELD_1 through USER_FIELD_4 are plant-specific — meaning varies by site"
    notes:
      - "Join to em_location_coordinates on func_loc_id = FUNCTIONAL_LOCATION for XY floor plan positions"
      - "SAMPLE_SUMMARY is a sort key, not a unique identifier"

  # ---------------------------------------------------------------------------
  # APP TABLE: em_location_coordinates
  # ---------------------------------------------------------------------------
  - name: em_location_coordinates
    business_name: Location Coordinates
    type: app_table
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      App-managed lookup table mapping SAP functional location IDs to XY
      coordinates on floor plan SVG images. Maintained by QM engineers via
      the EnvMon app UI. Not sourced from SAP.
    grain: One row per (func_loc_id, floor_id)
    primary_keys: [func_loc_id, floor_id]
    preferred_synonyms:
      - location coordinates
      - floor plan positions
      - coordinate map
    important_dimensions:
      - name: func_loc_id
        type: STRING
        description: "SAP functional location code (TPLNR) — join key to gold_inspection_point.FUNCTIONAL_LOCATION"
        example: "Q225-0101-SEV3-Z0-72"
      - name: floor_id
        type: STRING
        description: "Application floor identifier: F1, F2, or F3"
        example: "F1"
      - name: x_pos
        type: DOUBLE
        description: Relative X position on the floor plan image (0.0 to 100.0 percent)
      - name: y_pos
        type: DOUBLE
        description: Relative Y position on the floor plan image (0.0 to 100.0 percent)
      - name: updated_by
        type: STRING
        description: Databricks identity who last saved these coordinates
      - name: updated_at
        type: TIMESTAMP
        description: Timestamp of last coordinate update
    traps:
      - "Coordinates are percentages (0–100), not pixels — frontend must scale to SVG viewport"
      - "Not all functional locations have coordinates — new locations appear in gold_inspection_point before being mapped here"
    notes:
      - "This table is written by the EnvMon app backend, not by a pipeline"
      - "Column names are lowercase (app convention), unlike gold-layer tables which are UPPERCASE"

  # ===========================================================================
  # SHARED (trace2 + spc + envmon)
