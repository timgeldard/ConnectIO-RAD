  # ---------------------------------------------------------------------------
  # VIEW: spc_material_dim_mv
  # ---------------------------------------------------------------------------
  - name: spc_material_dim_mv
    business_name: SPC Material Dimension
    type: view
    tier: RESTRICTED
    approved_for_agent_use: true
    business_purpose: >
      Minimal material dimension for SPC context. Only materials that appear
      in SPC-relevant inspection data.
    grain: One row per (material_id)
    primary_keys: [material_id]
    preferred_synonyms:
      - SPC materials
    important_dimensions:
      - name: material_id
        type: STRING
        description: Material number
      - name: material_name
        type: STRING
        description: Material description
    traps:
      - "material_id appears twice in DESCRIBE output (MV artifact)"
      - "Only 3 columns — this is a filter dimension, not a full material master"
    notes:
      - "For full material details, join to gold_material with LANGUAGE_ID = 'E'"

  # ---------------------------------------------------------------------------
  # VIEW: spc_plant_material_dim_mv
  # ---------------------------------------------------------------------------
  - name: spc_plant_material_dim_mv
    business_name: SPC Plant-Material Dimension
    type: view
    tier: RESTRICTED
    approved_for_agent_use: true
    business_purpose: >
      Plant-material combinations in SPC scope. Used to filter valid
      plant/material pairs in SPC dropdowns.
    grain: One row per (material_id, plant_id)
    primary_keys: [material_id, plant_id]
    preferred_synonyms:
      - plant-material scope
    important_dimensions:
      - name: material_id
        type: STRING
        description: Material number
      - name: plant_id
        type: STRING
        description: Plant code
      - name: plant_name
        type: STRING
        description: Plant name
    traps:
      - "material_id appears twice (MV artifact)"
    notes:
      - "Only contains combinations that have SPC-relevant inspection data"

  # ---------------------------------------------------------------------------
  # VIEW: spc_batch_dim_mv
  # ---------------------------------------------------------------------------
  - name: spc_batch_dim_mv
    business_name: SPC Batch Dimension
    type: view
    tier: RESTRICTED
    approved_for_agent_use: true
    business_purpose: >
      Batch dimension for SPC charts. One row per material/batch with
      production date, last posting date, and period columns for time-series
      aggregation.
    grain: One row per (MATERIAL_ID, BATCH_ID)
    primary_keys: [MATERIAL_ID, BATCH_ID]
    preferred_synonyms:
      - SPC batches
    important_dimensions:
      - name: MATERIAL_ID
        type: STRING
        description: Material number
      - name: BATCH_ID
        type: STRING
        description: Batch number
      - name: batch_date
        type: DATE
        description: Batch production date
      - name: last_posting_date
        type: DATE
        description: Most recent goods movement date for this batch
      - name: plant_id
        type: STRING
        description: Plant code
      - name: batch_week
        type: TIMESTAMP
        description: Week start timestamp (for weekly aggregation)
      - name: batch_month
        type: TIMESTAMP
        description: Month start timestamp (for monthly aggregation)
    traps:
      - "MATERIAL_ID appears twice (MV artifact)"
      - "batch_week and batch_month are TIMESTAMP not DATE — cast if needed"
    notes:
      - "Used for time-series x-axis in SPC control charts"

  # ---------------------------------------------------------------------------
  # APP TABLE: spc_mic_chart_config
  # ---------------------------------------------------------------------------
  - name: spc_mic_chart_config
    business_name: SPC Chart Configuration
    type: app_table
    tier: RESTRICTED
    approved_for_agent_use: true
    business_purpose: >
      Agent-editable chart type overrides per MIC. QM engineers use this to
      specify which control chart type to render for a given characteristic
      (IMR, X-bar R, p-chart, etc.). Defaults to IMR if no row exists.
      Written by the SPC app backend.
    grain: One row per (plant_id, material_id, mic_id) — NULLs act as wildcards
    primary_keys: [plant_id, material_id, mic_id]
    preferred_synonyms:
      - chart config
      - chart type override
    important_dimensions:
      - name: plant_id
        type: STRING
        description: "SAP plant code; NULL = applies across all plants"
      - name: material_id
        type: STRING
        description: "SAP material code; NULL = applies across all materials"
      - name: mic_id
        type: STRING
        description: Inspection characteristic code
      - name: mic_name
        type: STRING
        description: Cached MIC name at time of override (for audit)
      - name: chart_type
        type: STRING
        description: "Chart type: imr | xbar_r | xbar_s | p_chart | np_chart | c_chart | u_chart"
      - name: rationale
        type: STRING
        description: Why this override exists — typed by the QM engineer
      - name: updated_by
        type: STRING
        description: Databricks user who set the override
      - name: updated_at
        type: TIMESTAMP
        description: When the override was last set
    traps:
      - "NULL plant_id or material_id means wildcard — match logic must handle NULL comparisons"
      - "Default chart type (when no row exists) is IMR — do not assume a row always exists"
    notes:
      - "App writes via INSERT/MERGE — not pipeline-managed"
      - "chart_type values are lowercase strings, not enum codes"

  # ---------------------------------------------------------------------------
  # APP TABLE: spc_locked_limits
  # ---------------------------------------------------------------------------
  - name: spc_locked_limits
    business_name: SPC Locked Limits
    type: app_table
    tier: RESTRICTED
    approved_for_agent_use: true
    business_purpose: >
      Frozen control limits per MIC, locked by a QM engineer after Phase I
      baseline analysis. Once locked, these limits override the dynamically
      calculated limits from spc_quality_metrics. Includes the centre line,
      UCL/LCL for X-bar and range charts, and metadata about the baseline
      period and locking rationale.
    grain: One row per (material_id, mic_id, plant_id, operation_id)
    primary_keys: [material_id, mic_id, plant_id, operation_id]
    preferred_synonyms:
      - locked limits
      - frozen limits
      - Phase I limits
    important_dimensions:
      - name: material_id
        type: STRING
        description: Material number
      - name: mic_id
        type: STRING
        description: Characteristic code
      - name: plant_id
        type: STRING
        description: Plant code
      - name: operation_id
        type: STRING
        description: Routing operation
      - name: chart_type
        type: STRING
        description: Chart type these limits apply to
      - name: cl
        type: DOUBLE
        description: Centre line (mean)
      - name: ucl
        type: DOUBLE
        description: Upper control limit
      - name: lcl
        type: DOUBLE
        description: Lower control limit
      - name: ucl_r
        type: DOUBLE
        description: Upper control limit for range chart
      - name: lcl_r
        type: DOUBLE
        description: Lower control limit for range chart
      - name: sigma_within
        type: DOUBLE
        description: Within-subgroup sigma at time of locking
      - name: baseline_from
        type: STRING
        description: Start of baseline period (date string)
      - name: baseline_to
        type: STRING
        description: End of baseline period (date string)
      - name: locked_by
        type: STRING
        description: Databricks user who locked the limits
      - name: locked_at
        type: TIMESTAMP
        description: When limits were locked
      - name: unified_mic_key
        type: STRING
        description: "Plant-scoped canonical MIC key: PLANT_ID||UPPER(TRIM(MIC_NAME))||UOM"
      - name: spec_signature
        type: STRING
        description: "Spec fingerprint at lock time (LSL|USL|Nominal) — used to detect post-lock spec drift"
      - name: locking_note
        type: STRING
        description: "Free-text justification (e.g., 'Phase I baseline 2024-Q4, 32 batches, Cp=1.42')"
    traps:
      - "baseline_from and baseline_to are STRING, not DATE — cast if comparing"
      - "unified_mic_key and mic_origin may be NULL on rows created before Migration 014"
      - "If spec_signature no longer matches live data, a stale-lock warning should be raised"
    notes:
      - "When locked limits exist, they take precedence over dynamic limits in spc_quality_metrics"
      - "App writes via INSERT — migration 000_setup_locked_limits.sql creates the table"

  # ===========================================================================
  # POH APP — Equipment History Views (csm_equipment_history schema)
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # VIEW: vw_gold_instrument
  # ---------------------------------------------------------------------------
  - name: vw_gold_instrument
    business_name: Instrument Master
    type: view
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Equipment/instrument master registry for the plant. One row per
      instrument. Contains equipment type, plant assignment, and descriptive
      attributes. Used as the source of truth for the Equipment Insights
      dashboard — counts and type distributions are derived from this view.
      Located in the csm_equipment_history schema; use instrument_tbl() helper.
    grain: One row per INSTRUMENT_ID
    primary_keys: [INSTRUMENT_ID]
    preferred_synonyms:
      - instrument
      - equipment
      - vessel
      - instrument master
    important_dimensions:
      - name: INSTRUMENT_ID
        type: STRING
        description: Unique identifier for the instrument/equipment
      - name: EQUIPMENT_TYPE
        type: STRING
        description: Classification of the instrument (e.g., Bioreactor, Tank, Skid)
      - name: PLANT_ID
        type: STRING
        description: Plant the instrument is assigned to
    traps:
      - "Single-Use Vessel rows are excluded from Equipment Insights counts — filter EQUIPMENT_TYPE != 'Single-Use Vessel'"
      - "EQUIPMENT_TYPE can be NULL — use COALESCE(EQUIPMENT_TYPE, 'Unknown') in aggregations"
    notes:
      - "Accessed via instrument_tbl('vw_gold_instrument') not tbl() — different schema (csm_equipment_history)"
      - "Scale verification data is NOT in this view — see scale_verification_results (RESTRICTED)"

  # ---------------------------------------------------------------------------
  # VIEW: vw_gold_equipment_history
  # ---------------------------------------------------------------------------
  - name: vw_gold_equipment_history
    business_name: Equipment History
    type: view
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Historical state-change events for plant equipment. Each row is a
      transition for a specific instrument between statuses (e.g., CLEAN →
      IN_USE → DIRTY). Used by the Vessel Planning page for heuristic vessel
      state classification and material affinity derivation.
      Located in the csm_equipment_history schema; use instrument_tbl() helper.
    grain: One row per state-change event (INSTRUMENT_ID, change_at_ms)
    primary_keys: [INSTRUMENT_ID, change_at_ms]
    preferred_synonyms:
      - equipment history
      - vessel history
      - instrument events
    important_dimensions:
      - name: INSTRUMENT_ID
        type: STRING
        description: Instrument identifier
      - name: STATUS_TO
        type: STRING
        description: State the instrument transitioned into
      - name: STATUS_FROM
        type: STRING
        description: State the instrument transitioned from
      - name: MATERIAL_ID
        type: STRING
        description: Material being processed during this event (nullable)
      - name: PLANT_ID
        type: STRING
        description: Plant code
      - name: change_at_ms
        type: BIGINT
        description: UTC epoch milliseconds of the state change
    traps:
      - "Accessed via instrument_tbl('vw_gold_equipment_history'), not tbl()"
      - "STATUS_TO keywords for state classification are heuristic — see vessel_planning_dal.py for the exact keyword sets"

  # ---------------------------------------------------------------------------
  # TABLE: scale_verification_results (RESTRICTED — do not query directly)
  # ---------------------------------------------------------------------------
  - name: scale_verification_results
    business_name: Scale Verification Results
    type: fact
    tier: RESTRICTED
    approved_for_agent_use: false
    business_purpose: >
      Scale calibration and verification records from Tulip. Tracks pass/fail
      status for each scale across periodic verification rounds.
      Located in connected_plant_prod.tulip schema (different catalog path).
    grain: One row per verification event
    primary_keys: []
    preferred_synonyms:
      - scale verification
      - calibration
      - scale results
    traps:
      - "DO NOT QUERY — requires a Unity Catalogue consumption view that does not yet exist"
      - "Querying directly will crash the app with a UC permission error"
      - "The Equipment Insights page has a placeholder for this data with a TODO note"
    notes:
      - "TODO: create a UC consumption view (connected_plant_prod.csm_equipment_history.vw_scale_verification or similar) before enabling queries"
      - "Not in csm_equipment_history schema — it lives in connected_plant_prod.tulip.scale_verification_results"

  # ---------------------------------------------------------------------------
  # APP TABLE: spc_exclusions
  # ---------------------------------------------------------------------------
  - name: spc_exclusions
    business_name: SPC Exclusions
    type: app_table
    tier: RESTRICTED
    approved_for_agent_use: true
    business_purpose: >
      Exclusion events for SPC data points. When a QM engineer excludes batches
      or individual data points from control chart analysis, the exclusion is
      recorded here with a justification, the affected date range, and
      before/after limit snapshots. Used for audit trail and to filter points
      from chart rendering.
    grain: One row per event_id
    primary_keys: [event_id]
    preferred_synonyms:
      - exclusions
      - excluded points
      - SPC exclusions
    important_dimensions:
      - name: event_id
        type: STRING
        description: Unique exclusion event identifier (UUID)
      - name: material_id
        type: STRING
        description: Material number
      - name: mic_id
        type: STRING
        description: Characteristic code
      - name: mic_name
        type: STRING
        description: Characteristic name
      - name: plant_id
        type: STRING
        description: Plant code
      - name: operation_id
        type: STRING
        description: Routing operation
      - name: chart_type
        type: STRING
        description: Chart type context
      - name: date_from
        type: STRING
        description: Start of exclusion date range
      - name: date_to
        type: STRING
        description: End of exclusion date range
      - name: justification
        type: STRING
        description: Engineer's written reason for the exclusion
      - name: action
        type: STRING
        description: "Exclusion action type (e.g., EXCLUDE, RECALCULATE)"
      - name: excluded_count
        type: INT
        description: Number of data points excluded
      - name: excluded_points_json
        type: STRING
        description: JSON array of excluded batch_id/sample tuples
      - name: before_limits_json
        type: STRING
        description: JSON snapshot of control limits before exclusion
      - name: after_limits_json
        type: STRING
        description: JSON snapshot of control limits after exclusion
      - name: user_id
        type: STRING
        description: Databricks user who performed the exclusion
      - name: event_ts
        type: TIMESTAMP
        description: When the exclusion was recorded
      - name: stratify_all
        type: BOOLEAN
        description: Whether exclusion applies across all stratifications
      - name: stratify_by
        type: STRING
        description: Stratification dimension (e.g., plant, operation)
    traps:
      - "date_from and date_to are STRING, not DATE — cast if comparing"
      - "excluded_points_json, before_limits_json, after_limits_json are JSON strings — parse carefully"
      - "stratify_all = TRUE means ignore stratify_by"
    notes:
      - "This is an append-only audit log — rows are never updated or deleted"
      - "Used by the SPC frontend to grey out excluded points on control charts"
