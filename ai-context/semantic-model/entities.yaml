  # ---------------------------------------------------------------------------
  # MATERIALIZED TABLE: gold_batch_delivery_mat
  # ---------------------------------------------------------------------------
  - name: gold_batch_delivery_mat
    business_name: Batch Delivery
    type: materialized_table
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Customer delivery/shipment lines per batch. Each row is a delivery
      document line showing goods issued to a customer. Includes customer
      details, country, quantity, and posting date. Sourced from SAP
      LIKP/LIPS + customer master.
    grain: One row per (DELIVERY, MATERIAL_ID, BATCH_ID) — but duplicates possible from extraction
    primary_keys: [DELIVERY, MATERIAL_ID, BATCH_ID]
    preferred_synonyms:
      - delivery
      - shipment
      - customer delivery
      - goods issue
    important_dimensions:
      - name: MATERIAL_ID
        type: STRING
        description: Material number
      - name: BATCH_ID
        type: STRING
        description: Batch number
      - name: PLANT_ID
        type: STRING
        description: Shipping plant
      - name: CUSTOMER_ID
        type: STRING
        description: SAP customer account number
      - name: CUSTOMER_NAME
        type: STRING
        description: Customer name
      - name: COUNTRY_ID
        type: STRING
        description: Ship-to country code (ISO 2-letter)
      - name: COUNTRY_NAME
        type: STRING
        description: Country name
      - name: DELIVERY
        type: STRING
        description: SAP delivery document number
      - name: ABS_QUANTITY
        type: DECIMAL(13,3)
        description: Absolute delivered quantity (always positive)
      - name: POSTING_DATE
        type: DATE
        description: Goods issue posting date
    traps:
      - "ALWAYS SELECT DISTINCT before SUM(ABS_QUANTITY) — duplicate rows exist from extraction"
      - "DELIVERY can be NULL for non-delivery movements — filter WHERE DELIVERY IS NOT NULL"
      - "CUSTOMER_NAME can be NULL — use COALESCE(CUSTOMER_NAME, '(unknown)')"
    notes:
      - "QUANTITY is signed; ABS_QUANTITY is unsigned — use ABS_QUANTITY for volume summaries"
      - "MOVEMENT_TYPE 601 = delivery, 602 = reversal"

  # ---------------------------------------------------------------------------
  # MATERIALIZED TABLE: gold_batch_mass_balance_mat
  # ---------------------------------------------------------------------------
  - name: gold_batch_mass_balance_mat
    business_name: Mass Balance
    type: materialized_table
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      All goods movements for batch-managed materials. Each row is one
      movement document line with signed quantity. Used for mass balance
      reconciliation: produced - consumed - shipped ± adjustments = stock.
      Sourced from SAP MSEG/MKPF.
    grain: One row per movement document line (MATERIAL_ID, BATCH_ID, POSTING_DATE, MOVEMENT_TYPE — not strictly unique)
    primary_keys: []
    preferred_synonyms:
      - mass balance
      - goods movements
      - inventory movements
      - material movements
    important_dimensions:
      - name: MATERIAL_ID
        type: STRING
        description: Material number
      - name: BATCH_ID
        type: STRING
        description: Batch number
      - name: PLANT_ID
        type: STRING
        description: Plant code
      - name: MOVEMENT_TYPE
        type: STRING
        description: "SAP 3-digit movement type (101=production, 261=consumption, 601=shipment, etc.)"
      - name: MOVEMENT_CATEGORY
        type: STRING
        description: "Derived category: Production, Shipment, Consumption, Transfer, Adjustment"
      - name: POSTING_DATE
        type: DATE
        description: SAP posting date
      - name: ABS_QUANTITY
        type: DECIMAL(13,3)
        description: Unsigned movement quantity
      - name: BALANCE_QTY
        type: DECIMAL(13,3)
        description: Signed quantity (positive=receipt, negative=issue)
      - name: PROCESS_ORDER_ID
        type: STRING
        description: Related process order (for production/consumption movements)
      - name: UOM
        type: STRING
        description: Base unit of measure
    traps:
      - "Use ABS_QUANTITY for volume summaries — always positive"
      - "Use BALANCE_QTY for running balance calculations — carries the sign"
      - "Exclude STO transfers: WHERE MOVEMENT_CATEGORY NOT LIKE 'STO%'"
      - "No true primary key — use GROUP BY for aggregations"
    notes:
      - "MOVEMENT_CATEGORY is the agent-preferred filter; MOVEMENT_TYPE for SAP-level detail"

