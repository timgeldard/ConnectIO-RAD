      - CoA results
    important_dimensions:
      - name: batch_id
        type: STRING
        description: Batch number
      - name: mic_code
        type: STRING
        description: Master inspection characteristic code
      - name: mic_name
        type: STRING
        description: Characteristic description
      - name: target_value
        type: DOUBLE
        description: Specification target
      - name: tolerance_range
        type: STRING
        description: Tolerance as display string
      - name: actual_result
