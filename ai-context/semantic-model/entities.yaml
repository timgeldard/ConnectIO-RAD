  # ---------------------------------------------------------------------------
  # VIEW: gold_batch_quality_result_v
  # ---------------------------------------------------------------------------
  - name: gold_batch_quality_result_v
    business_name: Quality Results
    type: view
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Individual MIC measurement results from SAP QM inspections. Each row is
      one characteristic measurement for one sample within an inspection lot.
      Includes quantitative values, qualitative codes, valuations (A/R), and
      tolerance limits. Sourced from SAP QASE/QASR via gold layer.
    grain: One row per (INSPECTION_LOT_ID, OPERATION_ID, MIC_ID, SAMPLE_ID)
    primary_keys: [INSPECTION_LOT_ID, OPERATION_ID, MIC_ID, SAMPLE_ID]
    preferred_synonyms:
      - quality results
      - MIC results
      - inspection results
      - test results
    important_dimensions:
      - name: INSPECTION_LOT_ID
        type: STRING
        description: Parent inspection lot
      - name: OPERATION_ID
        type: STRING
        description: Routing operation/step within the lot
      - name: MIC_ID
        type: STRING
        description: Inspection characteristic number
      - name: MIC_NAME
        type: STRING
        description: Short text for the inspection characteristic
      - name: MIC_CODE
        type: STRING
        description: Master inspection characteristic code (QPMK)
      - name: SAMPLE_ID
        type: STRING
        description: Partial sample number
      - name: QUANTITATIVE_RESULT
        type: DOUBLE
        description: Numeric measurement value (NULL for qualitative MICs)
      - name: TARGET_VALUE
        type: DOUBLE
        description: Specification target value
      - name: UPPER_TOLERANCE
        type: DOUBLE
        description: Upper specification limit
      - name: LOWER_TOLERANCE
        type: DOUBLE
        description: Lower specification limit
      - name: INSPECTION_RESULT_VALUATION
        type: STRING
        description: "Result valuation: A = Accepted, R = Rejected"
      - name: MATERIAL_ID
        type: STRING
        description: Material number
      - name: BATCH_ID
        type: STRING
        description: Batch number
      - name: PLANT_ID
        type: STRING
        description: Plant code
      - name: INSPECTION_METHOD
        type: STRING
        description: Inspection method used
    traps:
      - "QUANTITATIVE_RESULT is NULL for qualitative (pass/fail) characteristics — check before arithmetic"
      - "TOLERANCE column is a derived STRING — use UPPER_TOLERANCE / LOWER_TOLERANCE (DOUBLE) for numeric comparison"
      - "ORDER BY INSPECTION_LOT_ID, OPERATION_ID, MIC_ID, SAMPLE_ID for deterministic output"
    notes:
      - "Join to gold_batch_quality_lot_v on INSPECTION_LOT_ID + MATERIAL_ID + BATCH_ID for lot header"
      - "Used by SPC app for control chart data and by trace2 for Certificate of Analysis"

  # ---------------------------------------------------------------------------
  # VIEW: gold_batch_quality_summary_v
  # ---------------------------------------------------------------------------
  - name: gold_batch_quality_summary_v
    business_name: Quality Summary
    type: view
    tier: APPROVED
    approved_for_agent_use: true
    business_purpose: >
      Pre-aggregated quality summary per material/batch. Counts of inspection
      lots, accepted results, rejected results, and failed MICs. Use for
      quick batch status checks without scanning all individual results.
    grain: One row per (MATERIAL_ID, BATCH_ID)
    primary_keys: [MATERIAL_ID, BATCH_ID]
    preferred_synonyms:
      - quality summary
      - batch quality
      - pass/fail summary
    important_dimensions:
      - name: MATERIAL_ID
        type: STRING
        description: Material number
      - name: BATCH_ID
        type: STRING
        description: Batch number
      - name: lot_count
        type: BIGINT
        description: Number of inspection lots for this batch
      - name: latest_inspection_date
        type: DATE
        description: Most recent inspection date
      - name: accepted_result_count
        type: BIGINT
        description: Count of accepted (A) MIC results
      - name: rejected_result_count
        type: BIGINT
        description: Count of rejected (R) MIC results
      - name: failed_mic_count
        type: BIGINT
        description: Count of distinct MICs that had at least one rejection
    traps:
      - "This is a summary — use gold_batch_quality_result_v for MIC-level detail"
      - "rejected_result_count = 0 means the batch passed all inspections"
    notes:
      - "Used by trace2 for batch status derivation: rejected > 0 → Blocked"

