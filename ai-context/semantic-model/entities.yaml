  # ===========================================================================
  # SPC APP — Materialized Views & Config Tables
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # VIEW: spc_quality_metrics
  # ---------------------------------------------------------------------------
  - name: spc_quality_metrics
    business_name: SPC Quality Metrics
    type: view
    tier: RESTRICTED
    approved_for_agent_use: true
    business_purpose: >
      Pre-aggregated quality KPIs per material/plant/MIC combination. Contains
      58 columns covering statistical measures (mean, stddev, Cp, Cpk, Pp, Ppk),
      control limits (UCL/LCL), specification limits, Nelson rule flags, and
      batch-level aggregations. This is the primary data source for SPC
      dashboards and control chart rendering.
    grain: One row per (material_id, plant_id, mic_id, operation_id, batch_id)
    primary_keys: [material_id, plant_id, mic_id, operation_id, batch_id]
    preferred_synonyms:
      - SPC metrics
      - quality metrics
      - control chart data
    important_dimensions:
      - name: material_id
        type: STRING
        description: Material number
      - name: plant_id
        type: STRING
        description: Plant code
      - name: mic_id
        type: STRING
        description: Inspection characteristic number
      - name: mic_name
        type: STRING
        description: MIC description
      - name: operation_id
        type: STRING
        description: Routing operation
      - name: unified_mic_key
        type: STRING
        description: "Plant-scoped canonical MIC key: PLANT_ID||UPPER(TRIM(MIC_NAME))||UOM"
      - name: batch_id
        type: STRING
        description: Batch number
      - name: batch_date
        type: DATE
        description: Batch production date
      - name: mean_value
        type: DOUBLE
        description: Arithmetic mean of measured values
      - name: sigma_within
        type: DOUBLE
        description: Within-subgroup standard deviation (from average moving range)
      - name: x_bar_ucl
        type: DOUBLE
        description: X-bar upper control limit (mean + 3*sigma_within)
      - name: x_bar_lcl
        type: DOUBLE
        description: X-bar lower control limit (mean - 3*sigma_within)
      - name: spec_upper
        type: DOUBLE
        description: Upper specification limit
      - name: spec_lower
        type: DOUBLE
        description: Lower specification limit
      - name: cpk
        type: DOUBLE
        description: Process capability index (Cpk)
      - name: ppk
        type: DOUBLE
        description: Process performance index (Ppk)
      - name: ooc_rate
        type: DOUBLE
        description: Out-of-control rate (fraction of points beyond control limits)
    traps:
      - "58 columns — only query what you need, never SELECT *"
      - "Column names are lowercase (app convention)"
      - "spec_safe and normality_safe are flags (0/1) indicating whether specs/normality are consistent across batches"
      - "Control limits (x_bar_ucl/lcl) are calculated, not locked — see spc_locked_limits for frozen limits"
    notes:
      - "This is a metric view, not a materialized view — it queries underlying fact data"
      - "The DAL's fetch_control_limits() function reads from this entity"

