      - characteristic dimension
    important_dimensions:
      - name: material_id
        type: STRING
        description: Material number
      - name: mic_id
        type: STRING
        description: Characteristic number
      - name: mic_name
        type: STRING
        description: Characteristic short text
      - name: inspection_method
        type: STRING
        description: Inspection method
      - name: operation_id
        type: STRING
        description: Routing operation
      - name: is_attribute
        type: INT
        description: "1 = attribute (pass/fail), 0 = variable (measured)"
      - name: has_quantitative
        type: INT
