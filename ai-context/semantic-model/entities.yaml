      Sourced from SAP MCHB/MSKA. Always current — reflects latest extraction.
    grain: One row per (MATERIAL_ID, BATCH_ID, PLANT_ID)
    primary_keys: [MATERIAL_ID, BATCH_ID, PLANT_ID]
    preferred_synonyms:
      - stock
      - inventory
      - batch stock
      - current stock
    important_dimensions:
      - name: MATERIAL_ID
        type: STRING
        description: Material number
      - name: BATCH_ID
        type: STRING
        description: Batch number
      - name: PLANT_ID
        type: STRING
        description: Plant code
      - name: UNRESTRICTED
        type: DECIMAL(13,3)
        description: Freely available stock (KG)
      - name: BLOCKED
        type: DECIMAL(13,3)
        description: Blocked stock (KG)
      - name: QUALITY_INSPECTION
        type: DECIMAL(13,3)
        description: QI hold stock (KG)
      - name: RESTRICTED
        type: DECIMAL(13,3)
        description: Restricted stock (KG)
      - name: TRANSIT
        type: DECIMAL(13,3)
        description: Stock in transit (KG)
      - name: TOTAL_STOCK
        type: DECIMAL(17,3)
