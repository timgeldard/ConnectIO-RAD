# Inspection Lot Usage (gold_inspection_lot.USAGE — task list usage)
# ---------------------------------------------------------------------------
inspection_lot_usage:
  "1": { meaning: "Production", volume: "high",   description: "Used in production inspection plans" }
  "3": { meaning: "Universal", volume: "rare",    description: "Universal task list usage" }
  "4": { meaning: "Inspection for Engineering", volume: "high", description: "Engineering change inspection" }
  "5": { meaning: "Inspection Plan", volume: "highest", description: "Standard QM inspection plan" }
  "6": { meaning: "Functional Location", volume: "medium", description: "Inspection at functional location (envmon)" }
  "9": { meaning: "General Maintenance", volume: "medium", description: "Maintenance task list" }
