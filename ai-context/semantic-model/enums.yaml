  Z5:  { meaning: "Custom — Z5", volume: "rare",  description: "Kerry custom usage Z5" }
  Z8:  { meaning: "Custom — Z8", volume: "medium", description: "Kerry custom usage Z8" }
  Z:   { meaning: "Custom — Z", volume: "rare",   description: "Kerry custom usage Z" }

# ---------------------------------------------------------------------------
# Task List Types (gold_inspection_lot.TASK_LIST_TYPE)
# ---------------------------------------------------------------------------
task_list_types:
  "2": "Inspection plan"
  A:   "Routing"
  E:   "Equipment task list"
  Q:   "QM inspection plan"

# ===========================================================================
# SPC APP ENUMERATIONS
# ===========================================================================

# ---------------------------------------------------------------------------
# SPC Chart Types
# ---------------------------------------------------------------------------
spc_chart_types:
  imr:
    meaning: "Individual & Moving Range"
    description: >
      Default chart type. Individual chart (I) plots single observations;
      Moving Range chart (MR) plots |x_i - x_{i-1}|.  Uses d2 = 1.128
      for sigma estimation.
  xbar_r:
    meaning: "X-bar & Range"
    description: >
      Subgroup means chart (X-bar) with Range chart.  Used when natural
      subgroups exist (e.g. multiple samples per lot).
  xbar_s:
    meaning: "X-bar & Std Dev"
    description: >
      Subgroup means chart with Std Dev chart.  Preferred over X-bar R
      when subgroup size > 10.
  p_chart:
    meaning: "Proportion Defective"
    description: >
      For attribute (pass/fail) data.  Plots proportion defective per
      subgroup.  Used when is_attribute = 1 in characteristic dim.
  note: >
    Chart type resolution order:
    1. spc_mic_chart_config with matching plant_id + material_id (most specific)
    2. spc_mic_chart_config with NULL plant_id/material_id (wildcard)
    3. Default: imr

# ---------------------------------------------------------------------------
# SPC Exclusion Actions (spc_exclusions.action)
# ---------------------------------------------------------------------------
spc_exclusion_actions:
  manual_exclude:
    meaning: "User manually excluded data point(s)"
    excluded_count: "≥ 1"
    description: "Operator or quality engineer manually flagged point(s) as outliers"
  manual_restore:
    meaning: "User restored previously excluded point(s)"
    excluded_count: "0"
    description: "Reversal of a prior manual_exclude — point re-included in calculations"
  auto_clean_phase_i:
    meaning: "System auto-excluded during Phase I baseline cleaning"
    excluded_count: "≥ 1"
    description: >
      Automated outlier removal during Phase I limit calculation.
      Points beyond ±3σ iteratively removed until stable.
  clear_exclusions:
    meaning: "All exclusions cleared for a MIC context"
    excluded_count: "0"
    description: "Bulk reset — all prior exclusions for the MIC context are voided"

# ---------------------------------------------------------------------------
# SPC Stratify By (spc_exclusions.stratify_by)
# ---------------------------------------------------------------------------
spc_stratify_by:
  inspection_lot_id: "Exclusion scoped to a specific inspection lot"
  null: "Exclusion applies to the MIC context globally (no sub-stratification)"

# ---------------------------------------------------------------------------
# SPC Characteristic Attribute Flag (spc_characteristic_dim_mv.is_attribute)
# ---------------------------------------------------------------------------
spc_is_attribute:
  0: "Quantitative / variable — measured numeric value (e.g. moisture %, pH)"
  1: "Attribute / qualitative — pass/fail or categorical result"

# ---------------------------------------------------------------------------
# SPC Locked Limits Columns (semantic meaning)
# ---------------------------------------------------------------------------
# spc_locked_limits stores frozen Phase I control limits.
# When a row exists, these values OVERRIDE the dynamic limits
# calculated in spc_quality_metrics (x_bar_ucl, x_bar_lcl).
spc_locked_limit_fields:
  cl:           "Centre Line — frozen mean"
  ucl:          "Upper Control Limit — frozen UCL for individuals/X-bar chart"
  lcl:          "Lower Control Limit — frozen LCL for individuals/X-bar chart"
  ucl_r:        "Upper Control Limit for Range/MR chart"
  lcl_r:        "Lower Control Limit for Range/MR chart (often 0)"
  sigma_within: "Frozen within-subgroup sigma estimate"
  baseline_from: "Start date of Phase I baseline window"
  baseline_to:   "End date of Phase I baseline window"
  locked_by:     "User who locked the limits"
  locked_at:     "Timestamp when limits were locked"
  locking_note:  "Free-text reason for locking"
  mic_origin:    "Source system of the MIC (usually NULL — reserved for future use)"
  spec_signature: "Hash of specification at lock time — detects spec drift"
  unified_mic_key: "Composite key: material_id|mic_id|plant_id|operation_id"
