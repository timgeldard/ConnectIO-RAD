          SUM(CASE WHEN MOVEMENT_CATEGORY = 'Production' THEN ABS_QUANTITY ELSE 0 END) AS produced,
          SUM(CASE WHEN MOVEMENT_CATEGORY = 'Shipment'   THEN ABS_QUANTITY ELSE 0 END) AS shipped
        FROM {{CATALOG}}.gold.gold_batch_mass_balance_v
        WHERE MOVEMENT_CATEGORY NOT LIKE 'STO%'
        GROUP BY MATERIAL_ID, BATCH_ID
      ) mv ON mv.MATERIAL_ID = trace.material_id AND mv.BATCH_ID = trace.batch_id
    notes: NEVER join directly — always pre-aggregate by MATERIAL_ID + BATCH_ID

  - name: batch_lineage_to_stock_aggregated
    from_entity: gold_batch_lineage
    to_entity: gold_batch_stock_v
    cardinality: many-to-many
    join_type: LEFT JOIN
    pattern: aggregated_subquery
    purpose: Attach stock totals to lineage trace nodes
    example: |
      LEFT JOIN (
        SELECT MATERIAL_ID, BATCH_ID,
          SUM(UNRESTRICTED) AS unrestricted,
          SUM(BLOCKED) AS blocked,
          SUM(QUALITY_INSPECTION) AS qi,
          SUM(TOTAL_STOCK) AS current_stock
        FROM {{CATALOG}}.gold.gold_batch_stock_v
        GROUP BY MATERIAL_ID, BATCH_ID
      ) stk ON stk.MATERIAL_ID = trace.material_id AND stk.BATCH_ID = trace.batch_id
