  # ===========================================================================
  # SPC JOINS
  # ===========================================================================

  - name: spc_metrics_to_material
    from_entity: spc_quality_metrics
    to_entity: spc_material_dim_mv
    cardinality: many-to-one
    join_type: LEFT JOIN
    on:
      - "spc_material_dim_mv.material_id = spc_quality_metrics.material_id"
    purpose: Resolve material name for SPC metrics

  - name: spc_metrics_to_plant_material
    from_entity: spc_quality_metrics
    to_entity: spc_plant_material_dim_mv
    cardinality: many-to-one
    join_type: LEFT JOIN
    on:
      - "spc_plant_material_dim_mv.material_id = spc_quality_metrics.material_id"
      - "spc_plant_material_dim_mv.plant_id = spc_quality_metrics.plant_id"
    purpose: Resolve plant name for SPC metrics

  - name: spc_metrics_to_characteristic
    from_entity: spc_quality_metrics
    to_entity: spc_characteristic_dim_mv
    cardinality: many-to-one
    join_type: LEFT JOIN
    on:
      - "spc_characteristic_dim_mv.material_id = spc_quality_metrics.material_id"
      - "spc_characteristic_dim_mv.mic_id = spc_quality_metrics.mic_id"
      - "spc_characteristic_dim_mv.operation_id = spc_quality_metrics.operation_id"
    purpose: Get MIC metadata (attribute flag, normalised name) for SPC metrics

  - name: spc_metrics_to_batch_dim
    from_entity: spc_quality_metrics
    to_entity: spc_batch_dim_mv
    cardinality: many-to-one
    join_type: LEFT JOIN
    on:
      - "spc_batch_dim_mv.MATERIAL_ID = spc_quality_metrics.material_id"
      - "spc_batch_dim_mv.BATCH_ID = spc_quality_metrics.batch_id"
    purpose: Get batch date and period columns for time-series charts
    notes: "Case mismatch: spc_batch_dim_mv uses UPPER (MATERIAL_ID), spc_quality_metrics uses lower (material_id)"

  - name: spc_metrics_to_locked_limits
    from_entity: spc_quality_metrics
    to_entity: spc_locked_limits
    cardinality: many-to-one
    join_type: LEFT JOIN
    on:
      - "spc_locked_limits.material_id = spc_quality_metrics.material_id"
      - "spc_locked_limits.mic_id = spc_quality_metrics.mic_id"
      - "spc_locked_limits.plant_id = spc_quality_metrics.plant_id"
      - "spc_locked_limits.operation_id = spc_quality_metrics.operation_id"
    purpose: Override dynamic limits with frozen Phase I limits when they exist
    notes: >
      When spc_locked_limits has a matching row, its UCL/LCL take precedence
      over the dynamic x_bar_ucl/x_bar_lcl in spc_quality_metrics.

  - name: spc_metrics_to_chart_config
    from_entity: spc_quality_metrics
    to_entity: spc_mic_chart_config
    cardinality: many-to-one
    join_type: LEFT JOIN
    on:
      - "spc_mic_chart_config.mic_id = spc_quality_metrics.mic_id"
    purpose: Get chart type override for a MIC
    notes: >
      spc_mic_chart_config uses NULL plant_id/material_id as wildcards.
      Match logic: specific > wildcard > default (IMR).
      Simple join on mic_id gives the most specific match for single-plant queries.

  - name: spc_metrics_to_exclusions
    from_entity: spc_quality_metrics
    to_entity: spc_exclusions
    cardinality: many-to-many
    join_type: LEFT JOIN
    on:
      - "spc_exclusions.material_id = spc_quality_metrics.material_id"
      - "spc_exclusions.mic_id = spc_quality_metrics.mic_id"
      - "spc_exclusions.plant_id = spc_quality_metrics.plant_id"
    purpose: Identify excluded data points for a given MIC context
    notes: >
      Also filter by date range: spc_exclusions.date_from / date_to overlap
      with the batch_date being rendered. Exclusions are an append-only log
      so multiple events may apply to the same MIC.

# =============================================================================
# FORBIDDEN JOINS
# =============================================================================

forbidden_joins:

  - name: direct_movement_to_lineage
    from_entity: gold_inventory_movement
    to_entity: gold_batch_lineage
    severity: HIGH
    reason: >
      Direct join without aggregation causes massive fan-out.  Movements have
      many rows per batch; lineage has multiple edges per batch.
    correct_approach: Use lineage_to_movement_aggregated pattern above

  - name: direct_mass_balance_to_lineage
    from_entity: gold_batch_mass_balance_v
    to_entity: gold_batch_lineage
    severity: HIGH
    reason: >
      Direct join without aggregation causes massive fan-out.  Movements have
      many rows per batch; lineage has multiple edges per batch.
    correct_approach: Pre-aggregate movements by MATERIAL_ID + BATCH_ID in subquery first

  - name: direct_stock_to_lineage
    from_entity: gold_batch_stock_v
    to_entity: gold_batch_lineage
    severity: HIGH
    reason: >
      Stock has one row per plant; lineage has edges per batch.  Direct join
      fans out by plant count.
    correct_approach: Pre-aggregate stock by MATERIAL_ID + BATCH_ID before joining

  - name: direct_delivery_to_lineage
    from_entity: gold_batch_delivery_v
    to_entity: gold_batch_lineage
    severity: HIGH
    reason: >
      Delivery rows can be duplicated from extraction.  Direct join inflates
      shipped quantities.
    correct_approach: Deduplicate (SELECT DISTINCT) then aggregate before joining

  - name: oee_to_process_order
    from_entity: metric_oee_daily
    to_entity: gold_process_order
    severity: HIGH
    reason: >
      OEE is at production-line-day grain; process orders are at order grain.
      Multiple orders run on the same line on the same day.  No clean FK.
    correct_approach: Correlate via PLANT_ID + PRODUCTION_LINE + date range

  - name: cross_metric_direct
    from_entity: metric_oee_daily
    to_entity: metric_quality_yield
    severity: MEDIUM
    reason: >
      Different grains (line-day vs order-batch).  Direct join produces
      incorrect cross-products.
    correct_approach: Aggregate both to a common grain (plant-week) before combining

  - name: spc_metrics_to_gold_material
    from_entity: spc_quality_metrics
    to_entity: gold_material
    severity: MEDIUM
    reason: >
      SPC entities use their own dimension MVs (spc_material_dim_mv) which
      are scoped to SPC-relevant materials.  Joining to gold_material adds
      LANGUAGE_ID complexity and may return materials outside SPC scope.
    correct_approach: Use spc_material_dim_mv or spc_plant_material_dim_mv instead

  - name: cross_app_spc_to_delivery
    from_entity: spc_quality_metrics
    to_entity: gold_batch_delivery_v
    severity: MEDIUM
    reason: >
      SPC metrics and delivery data serve different apps.  No approved join
      path exists.  Grain mismatch (MIC-level vs delivery-line).
    correct_approach: If needed, aggregate both to MATERIAL_ID + BATCH_ID grain first and validate with engineering

# =============================================================================
# COMMON JOIN TRAPS
# =============================================================================

common_traps:

  - trap: Missing LANGUAGE_ID = 'E' on gold_material
    impact: Row duplication — one extra row per language
    fix: Always include gold_material.LANGUAGE_ID = 'E' in ON or WHERE

  - trap: Joining movements or stock to lineage without pre-aggregation
    impact: Massive fan-out, inflated quantities
    fix: Always pre-aggregate by MATERIAL_ID + BATCH_ID in a subquery

  - trap: Summing delivery ABS_QUANTITY without deduplication
    impact: Double-counted shipments
    fix: SELECT DISTINCT DELIVERY, MATERIAL_ID, BATCH_ID, ABS_QUANTITY before SUM

  - trap: Joining quality_result to quality_lot on INSPECTION_LOT_ID only
    impact: Fan-out for lots spanning multiple materials
    fix: Join on all three keys — INSPECTION_LOT_ID + MATERIAL_ID + BATCH_ID

  - trap: Using gold_material for SPC instead of spc_material_dim_mv
    impact: LANGUAGE_ID complexity, out-of-scope materials
    fix: Use SPC-scoped dimension MVs within the SPC app

  - trap: Case mismatch between SPC MVs and SPC metrics
    impact: Silent join failure (zero rows)
    fix: "spc_batch_dim_mv uses MATERIAL_ID (upper); spc_quality_metrics uses material_id (lower) — Databricks is case-insensitive by default but be aware in code"

  - trap: Ignoring NULL wildcards in spc_mic_chart_config
    impact: Missing chart type overrides
    fix: Match logic must handle NULL plant_id/material_id as wildcards

  - trap: Averaging percentages without weighting
    impact: Small-volume lines skew the average
    fix: "Weighted average: SUM(pct * weight) / SUM(weight)"

  - trap: Including DELETED orders in schedule adherence
    impact: Denominator inflation
    fix: "Filter ORDER_STATUS NOT IN ('DELETED', 'CREATED')"

  - trap: Not filtering CHILD_BATCH_ID IS NOT NULL in lineage
    impact: Scrap/waste rows pollute trace results
    fix: Add WHERE CHILD_BATCH_ID IS NOT NULL to recursive anchor
