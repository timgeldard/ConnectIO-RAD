  - name: stock_to_quality_summary
    from_entity: gold_batch_stock_v
    to_entity: gold_batch_quality_summary_v
    cardinality: one-to-one
    join_type: LEFT JOIN
    on:
      - "gold_batch_quality_summary_v.MATERIAL_ID = gold_batch_stock_v.MATERIAL_ID"
      - "gold_batch_quality_summary_v.BATCH_ID = gold_batch_stock_v.BATCH_ID"
    purpose: Combine stock position with quality status for batch status derivation
    notes: Both at MATERIAL_ID + BATCH_ID grain — safe 1:1 join after stock aggregation

  - name: batch_summary_to_stock_aggregated
    from_entity: gold_batch_summary_v
    to_entity: gold_batch_stock_v
    cardinality: one-to-one
    join_type: LEFT JOIN
    pattern: aggregated_subquery
    on:
      - "stk.MATERIAL_ID = gold_batch_summary_v.MATERIAL_ID"
      - "stk.BATCH_ID = gold_batch_summary_v.BATCH_ID"
    purpose: Attach total stock to batch summary
    example: |
      LEFT JOIN (
        SELECT MATERIAL_ID, BATCH_ID,
          SUM(UNRESTRICTED) AS unrestricted,
          SUM(BLOCKED) AS blocked,
          SUM(QUALITY_INSPECTION) AS qi,
          SUM(TOTAL_STOCK) AS total_stock
        FROM {{CATALOG}}.gold.gold_batch_stock_v
        GROUP BY MATERIAL_ID, BATCH_ID
      ) stk ON stk.MATERIAL_ID = s.MATERIAL_ID AND stk.BATCH_ID = s.BATCH_ID
    notes: ALWAYS pre-aggregate stock across plants before joining

  - name: production_history_to_material
    from_entity: gold_batch_production_history_v
