  - name: batch_lineage_to_delivery_aggregated
    from_entity: gold_batch_lineage
    to_entity: gold_batch_delivery_v
    cardinality: many-to-many
    join_type: LEFT JOIN
    pattern: aggregated_subquery
    purpose: Attach shipped quantities to lineage trace nodes
    example: |
      LEFT JOIN (
        SELECT MATERIAL_ID, BATCH_ID, SUM(ABS_QUANTITY) AS total_shipped
        FROM (
          SELECT DISTINCT MATERIAL_ID, BATCH_ID, DELIVERY, ABS_QUANTITY
          FROM {{CATALOG}}.gold.gold_batch_delivery_v
        ) dv
        GROUP BY MATERIAL_ID, BATCH_ID
      ) del ON del.MATERIAL_ID = trace.material_id AND del.BATCH_ID = trace.batch_id
    notes: ALWAYS deduplicate deliveries (SELECT DISTINCT) before summing

