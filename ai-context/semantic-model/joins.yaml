    purpose: Resolve material description for inspection lots

  # ===========================================================================
  # SHARED QUALITY JOINS
  # ===========================================================================

  - name: quality_result_to_quality_lot
    from_entity: gold_batch_quality_result_v
    to_entity: gold_batch_quality_lot_v
    cardinality: many-to-one
    join_type: LEFT JOIN
    on:
      - "gold_batch_quality_lot_v.INSPECTION_LOT_ID = gold_batch_quality_result_v.INSPECTION_LOT_ID"
      - "gold_batch_quality_lot_v.MATERIAL_ID = gold_batch_quality_result_v.MATERIAL_ID"
      - "gold_batch_quality_lot_v.BATCH_ID = gold_batch_quality_result_v.BATCH_ID"
    purpose: Attach lot header info (dates, UD text) to individual results
    notes: Use ALL THREE join keys to avoid fan-out on multi-material lots

  - name: quality_result_to_material
    from_entity: gold_batch_quality_result_v
    to_entity: gold_material
    cardinality: many-to-one
    join_type: LEFT JOIN
    on:
      - "gold_material.MATERIAL_ID = gold_batch_quality_result_v.MATERIAL_ID"
    required_filters:
      - "gold_material.LANGUAGE_ID = 'E'"
    purpose: Resolve material description for quality results

  - name: quality_result_to_plant
