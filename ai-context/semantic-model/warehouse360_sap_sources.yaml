    module:     WM
    desc:       Transfer order header
    status:     available
    catalog:    sap
    full_name:  connected_plant_uat.sap.transferorderobjects_ltak

  - sap_table:  LTAP
    module:     WM
    desc:       Transfer order item
    status:     available
    catalog:    sap
    full_name:  connected_plant_uat.sap.transferorderobjects_ltap

  - sap_table:  LTBK
    module:     WM
    desc:       Transfer requirement header
