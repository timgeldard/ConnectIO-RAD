# ── Discovery: finding tables in Databricks ──────────────────────────────────
#
# When a new SAP table is needed and its status above is `missing`, or when you
# need to verify a table exists / find its exact name, use the Databricks CLI.
# The CLI is available as `databricks` and is pre-authorised in this environment.
#
discovery:
  note: >
    Use these commands to search for tables before declaring a table missing or
    requesting a new extraction from the SAP team. Always search both catalogs.

  commands:

    list_sap_schema:
      desc: List all tables in connected_plant_uat.sap
      command: databricks tables list --catalog connected_plant_uat --schema sap
      output: JSON array; each object has a `full_name` and `table_type` field.

    list_central_schema:
      desc: List all tables in published_uat.central_services
      command: databricks tables list --catalog published_uat --schema central_services
      output: JSON array; each object has a `full_name` and `table_type` field.

    search_by_sap_table_name:
      desc: >
        Filter both lists for a specific SAP table name (e.g. LINV).
        Tables follow the pattern <business_object>_<SAP_TABLE> so grep for the
        suffix, case-insensitive.
      example: |
        databricks tables list --catalog connected_plant_uat --schema sap \
          | python3 -c "import sys,json; [print(t['full_name']) for t in json.load(sys.stdin)['tables'] if 'linv' in t['full_name'].lower()]"

    describe_table:
      desc: Get column names and data types for a specific table
      command: databricks tables get --full-name <catalog.schema.table_name>
      example: databricks tables get --full-name connected_plant_uat.sap.quant_lqua
      output: JSON with `columns` array containing `name`, `type_name`, `nullable`.

    list_all_schemas_in_catalog:
      desc: Discover all schemas in a catalog (useful if a table may be in a different schema)
      command: databricks schemas list --catalog <catalog_name>
      example: databricks schemas list --catalog published_uat

  search_strategy:
    - step: 1
      action: >
        Search connected_plant_uat.sap using the SAP table name as a suffix
        (e.g. grep for `_linv`). The naming convention is consistent but the
        business-object prefix varies.
    - step: 2
      action: >
        If not found in sap, search published_uat.central_services the same way.
        central_services has broader cross-plant coverage and sometimes includes
        tables not yet extracted to the plant-specific schema.
    - step: 3
      action: >
        If still not found, check for functional equivalents. For inventory tables
        in particular, SAP has overlapping tables (e.g. IKPF/ISEG cover physical
        inventory; LQUA covers WM bin stock). Review the todo note on the missing
        entry above for known alternatives.
    - step: 4
      action: >
        If a table is genuinely absent from both schemas, add it to this file with
        status: missing and a todo note, then raise a data engineering request to
        schedule the SAP extraction. Do not build gold-layer views against tables
        that do not yet exist.
