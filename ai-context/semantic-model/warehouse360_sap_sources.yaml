    full_name:  connected_plant_uat.sap.quant_lqua

  - sap_table:  LINV
    module:     WM
    desc:       WM inventory document header
    status:     missing
    todo: >
      Not found in connected_plant_uat.sap or published_uat.central_services.
      published_uat.central_services has header_physical_inventory_doc_ikpf (IKPF)
      and physical_inventory_doc_items_iseg (ISEG) which may cover this use case.
      Confirm with SAP team before requesting a LINV extraction.

  # ── LE/SD — Logistics Execution / Sales & Distribution ───────────────────
