# warehouse360_sap_sources.yaml
# Raw SAP source table availability for the Warehouse 360° app.
#
# PURPOSE: Reference for data engineers building gold-layer views.
#          These are raw extraction tables — NOT approved query targets.
#          Agents must use entities.yaml (gold-layer views) for SQL.
#
# CATALOGS:
#   connected_plant_uat.sap       — plant-specific SAP extractions (MANAGED tables)
#   published_uat.central_services — cross-plant SAP extractions (VIEWs)
#
# NAMING CONVENTION: <business_object_name>_<SAP_TABLE_NAME>
#   e.g.  transferorderobjects_ltak,  batches_mcha
#
# STATUS KEY:
#   available — table confirmed present, full_name gives the exact Databricks table
#   missing   — not found in either catalog; todo explains workaround / next step
#
# DISCOVERING NEW TABLES (agent instructions):
#   See the `discovery` section at the bottom of this file.

catalogs:
  sap:
    databricks_path: connected_plant_uat.sap
    table_type: MANAGED
    note: Plant-level SAP extractions for IE01. Lower-underscore naming.
  central:
    databricks_path: published_uat.central_services
    table_type: VIEW
    note: Cross-plant SAP extractions shared across ConnectIO apps.

tables:

  # ── PP — Production Planning ─────────────────────────────────────────────
  - sap_table:  AFKO
    module:     PP
    desc:       Production order header
    status:     available
    catalog:    sap
    full_name:  connected_plant_uat.sap.productionorderobject_afko

  - sap_table:  AFPO
    module:     PP
    desc:       Production order item
    status:     available
