bundle:
  name: connectedquality
  databricks_cli_version: '>= 0.283.0'

sync:
  include:
    - app.yaml
    - frontend/dist/**
    - shared_db/**
    - shared_api/**

variables:
  app_name:
    default: connectedquality
  warehouse_http_path:
    default: /sql/1.0/warehouses/e76480b94bea6ed5
  trace_catalog:
    default: connected_plant_uat
  trace_schema:
    default: gold
  budget_policy_id:
    default: ""

targets:
  uat:
    default: true
    variables:
      budget_policy_id: "86045e18-f119-4a18-bc16-b533069ebbec"
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
  prod:
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    # Set budget_policy_id to the prod workspace policy value before deploying to prod.

resources:
  apps:
    connectedquality:
      name: ${var.app_name}
      description: ConnectedQuality — integrated quality intelligence shell (Trace · EnvMon · SPC)
      budget_policy_id: ${var.budget_policy_id}
      source_code_path: .
      user_api_scopes:
        - sql
      # Run `make deploy` rather than `databricks bundle deploy` directly.
      # The Makefile deploy target builds the frontend, renders app.yaml,
      # deploys the bundle, and runs post_deploy to activate the app.
