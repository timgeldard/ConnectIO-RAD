[app]
name = "envmon"
bundle_name = "envmon"
default_profile = "uat"
default_target = "uat"
template = "app.template.yaml"
config_output = "app.yaml"

[build]
cwd = "."
command = "python3 scripts/build.py"

[bundle]
include_target = true

[post_deploy]
enabled = true
source_target = "target"
repair_sql_scope = true

[[migrations]]
name = "em_location_coordinates"
file = "scripts/migrations/000_create_em_location_coordinates.sql"
warehouse_id_env = "DATABRICKS_WAREHOUSE_ID"

[[migrations]]
name = "em_drop_coordinates"
file = "scripts/migrations/001a_drop_em_location_coordinates.sql"
warehouse_id_env = "DATABRICKS_WAREHOUSE_ID"

[[migrations]]
name = "em_location_coordinates_v2"
file = "scripts/migrations/001b_create_em_location_coordinates.sql"
warehouse_id_env = "DATABRICKS_WAREHOUSE_ID"

[[migrations]]
name = "em_plant_floor"
file = "scripts/migrations/001c_create_em_plant_floor.sql"
warehouse_id_env = "DATABRICKS_WAREHOUSE_ID"

[targets.uat.env]
DATABRICKS_WAREHOUSE_ID = "e76480b94bea6ed5"
DATABRICKS_WAREHOUSE_HTTP_PATH = "/sql/1.0/warehouses/e76480b94bea6ed5"
TRACE_CATALOG = "connected_plant_uat"
TRACE_SCHEMA = "gold"
CENTRAL_SERVICES_CATALOG = "published_uat"

[targets.prod.env]
DATABRICKS_WAREHOUSE_ID = ""
DATABRICKS_WAREHOUSE_HTTP_PATH = ""
TRACE_CATALOG = ""
TRACE_SCHEMA = "gold"
CENTRAL_SERVICES_CATALOG = "published_prod"
