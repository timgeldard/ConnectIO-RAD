# Databricks Apps configuration — generated from app.template.yaml by `make render-app-config`
# Do not edit app.yaml directly; edit this template instead.
# auth_type and requested_scopes are configured via the App Settings UI (User authorization).
resources:
  genie-space-quality:
    type: genie
    id: "${GENIE_SPACE_QUALITY}"
  genie-space-poh:
    type: genie
    id: "${GENIE_SPACE_POH}"
  genie-space-trace:
    type: genie
    id: "${GENIE_SPACE_TRACE}"
  genie-space-warehouse:
    type: genie
    id: "${GENIE_SPACE_WAREHOUSE}"

command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: DATABRICKS_WAREHOUSE_HTTP_PATH
    value: "${DATABRICKS_WAREHOUSE_HTTP_PATH}"
  - name: POH_CATALOG
    value: "${POH_CATALOG}"
  - name: POH_SCHEMA
    value: "${POH_SCHEMA}"
  - name: APP_TRUST_X_FORWARDED_HOST
    value: "true"
  # Legacy fallback - points to POH (the most general space)
  - name: GENIE_SPACE_ID
    value: "${GENIE_SPACE_POH}"
  - name: GENIE_SPACE_QUALITY
    value: "${GENIE_SPACE_QUALITY}"
  - name: GENIE_SPACE_POH
    value: "${GENIE_SPACE_POH}"
  - name: GENIE_SPACE_TRACE
    value: "${GENIE_SPACE_TRACE}"
  - name: GENIE_SPACE_WAREHOUSE
    value: "${GENIE_SPACE_WAREHOUSE}"
  - name: TRACE_CATALOG
    value: "${TRACE_CATALOG}"
  - name: TRACE_SCHEMA
    value: "${TRACE_SCHEMA}"
  - name: WH360_SCHEMA
    value: "${WH360_SCHEMA}"
  # WARNING: /tmp/ is ephemeral — wiped on container recycle. User preferences are lost
  # on every cold start. Migrate to a UC Volume or Lakebase for persistence.
  - name: PREFS_DB_PATH
    value: "${PREFS_DB_PATH}"

  # JWT verification — defence-in-depth. The Databricks Apps proxy validates
  # the token upstream; the app additionally verifies the signature against
  # the workspace JWKS endpoint so a bypass of the proxy alone cannot mint
  # acceptable tokens.
  - name: AUTH_JWKS_URL
    value: "${AUTH_JWKS_URL}"
  - name: AUTH_JWT_AUDIENCE
    value: "${AUTH_JWT_AUDIENCE}"
  - name: AUTH_JWT_ISSUER
    value: "${AUTH_JWT_ISSUER}"
  - name: AUTH_ALLOW_UNVERIFIED_JWT
    value: "${AUTH_ALLOW_UNVERIFIED_JWT}"
