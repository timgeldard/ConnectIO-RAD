# Databricks Apps configuration — generated from app.template.yaml by `make render-app-config`
# Do not edit app.yaml directly; edit this template instead.
# auth_type and requested_scopes are configured via the App Settings UI (User authorization).
resources:
  genie-space:
    type: genie
    id: "${GENIE_SPACE_ID}"

command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: DATABRICKS_WAREHOUSE_HTTP_PATH
    value: "${DATABRICKS_WAREHOUSE_HTTP_PATH}"
  - name: POH_CATALOG
    value: "${POH_CATALOG}"
  - name: POH_SCHEMA
    value: "${POH_SCHEMA}"
  - name: APP_TRUST_X_FORWARDED_HOST
    value: "true"
  - name: GENIE_SPACE_ID
    value: "${GENIE_SPACE_ID}"
  - name: TRACE_CATALOG
    value: "${TRACE_CATALOG}"
  - name: TRACE_SCHEMA
    value: "${TRACE_SCHEMA}"
  - name: PREFS_DB_PATH
    value: "${PREFS_DB_PATH}"

  # Databricks Apps proxy pre-validates JWTs before forwarding to this process;
  # value is set per-target in deploy.toml. Override via shell env to disable for non-proxy deploys.
  - name: AUTH_ALLOW_UNVERIFIED_JWT
    value: "${AUTH_ALLOW_UNVERIFIED_JWT}"
