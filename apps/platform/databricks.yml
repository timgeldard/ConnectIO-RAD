bundle:
  name: platform
  databricks_cli_version: '>= 0.283.0'

sync:
  include:
    - app.yaml
    - requirements.txt
    - backend/**
    - static/**
    - wheels/**
  exclude:
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "**/.pytest_cache/**"
    - "**/.mypy_cache/**"
    - "**/.ruff_cache/**"
    - "**/node_modules/**"
    - scripts/**
    - deploy.toml
    - Makefile
    - app.template.yaml
    - frontend/**
    - standalone/**

variables:
  app_name:
    default: platform
  budget_policy_id:
    default: ""

targets:
  uat:
    default: true
    variables:
      budget_policy_id: "86045e18-f119-4a18-bc16-b533069ebbec"
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
  prod:
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    # Set budget_policy_id to the prod workspace policy value before deploying to prod.

resources:
  apps:
    platform:
      name: ${var.app_name}
      description: ConnectIO Platform — unified shell for ConnectedQuality, ProcessOrderHistory, and Warehouse360
      budget_policy_id: ${var.budget_policy_id}
      source_code_path: .
      user_api_scopes:
        - sql
        - dashboards.genie
