[app]
name = "platform"
bundle_name = "platform"
default_profile = "uat"
default_target = "uat"
template = "app.template.yaml"
config_output = "app.yaml"

[build]
cwd = "."
command = "python3 scripts/build.py"

[bundle]
include_target = true

[post_deploy]
enabled = true
source_target = "target"
repair_sql_scope = false

# Sub-app deploy.tomls whose [[migrations]] entries should be discovered
# when this platform deploy is invoked with --run-migrations. Each entry
# is repo-root-relative. Must stay aligned with the wheels/frontends
# enumerated in apps/platform/scripts/build.py — there is no project
# graph dependency edge for this today (see CI `platform-build` job).
[platform]
bundled_apps = [
  "apps/connectedquality",
  "apps/envmon",
  "apps/processorderhistory",
  "apps/spc",
  "apps/trace2",
  "apps/warehouse360",
]

[targets.uat.env]
DATABRICKS_WAREHOUSE_ID = "e76480b94bea6ed5"
DATABRICKS_WAREHOUSE_HTTP_PATH = "/sql/1.0/warehouses/e76480b94bea6ed5"
# POH
POH_CATALOG = "connected_plant_uat"
POH_SCHEMA = "csm_process_order_history"
# Genie spaces (domain-aligned; GENIE_SPACE_ID retained as legacy fallback)
GENIE_SPACE_ID = "01f148a2098315b5b3c10352a07900b0"
GENIE_SPACE_QUALITY = "01f148a2029514e884ccb9d50d7fdc7e"
GENIE_SPACE_POH = "01f148a2098315b5b3c10352a07900b0"
GENIE_SPACE_TRACE = "01f148a20dc019d396709886269a6035"
GENIE_SPACE_WAREHOUSE = "01f148a211291b2cbda5aa0a0e2ff711"
# CQ + POH share `gold`; W360 has its own schema.
TRACE_CATALOG = "connected_plant_uat"
TRACE_SCHEMA = "gold"
WH360_SCHEMA = "wh360"
# Composable dashboards
DASHBOARD_CATALOG = "connected_plant_uat"
DASHBOARD_SCHEMA = "dashboards"
# Preferences SQLite path (survives within a single container lifecycle)
PREFS_DB_PATH = "/tmp/connectio_platform_prefs.db"
# JWT verification — workspace OIDC discovery values for UAT.
# Discovery doc: https://adb-604667594731808.8.azuredatabricks.net/oidc/.well-known/openid-configuration
AUTH_JWKS_URL = "https://northeurope-c2.azuredatabricks.net/oidc/jwks.json"
AUTH_JWT_ISSUER = "https://adb-604667594731808.8.azuredatabricks.net/oidc"
AUTH_ALLOW_UNVERIFIED_JWT = "false"

[targets.prod.env]
DATABRICKS_WAREHOUSE_ID = "161e0117e7a3507f"
DATABRICKS_WAREHOUSE_HTTP_PATH = "/sql/1.0/warehouses/161e0117e7a3507f"
POH_CATALOG = "connected_plant_prod"
POH_SCHEMA = "csm_process_order_history"
# Genie spaces (prod domain spaces TBD; all fall back to single prod space until created)
GENIE_SPACE_ID = "01f1446c282c1f29815ef4dfa6824739"
GENIE_SPACE_QUALITY = "01f1446c282c1f29815ef4dfa6824739"
GENIE_SPACE_POH = "01f1446c282c1f29815ef4dfa6824739"
GENIE_SPACE_TRACE = "01f1446c282c1f29815ef4dfa6824739"
GENIE_SPACE_WAREHOUSE = "01f1446c282c1f29815ef4dfa6824739"
TRACE_CATALOG = "connected_plant_prod"
TRACE_SCHEMA = "gold"
WH360_SCHEMA = "wh360"
# Composable dashboards (tables to be provisioned in prod before first deploy)
DASHBOARD_CATALOG = "connected_plant_prod"
DASHBOARD_SCHEMA = "dashboards"
PREFS_DB_PATH = "/tmp/connectio_platform_prefs.db"
# JWT verification — workspace OIDC discovery values for prod.
# Discovery doc: https://adb-3998371303355516.16.azuredatabricks.net/oidc/.well-known/openid-configuration
AUTH_JWKS_URL = "https://northeurope-c2.azuredatabricks.net/oidc/jwks.json"
AUTH_JWT_ISSUER = "https://adb-3998371303355516.16.azuredatabricks.net/oidc"
AUTH_ALLOW_UNVERIFIED_JWT = "false"
