<!DOCTYPE html>
<html lang="en">
<head>
<base href="/operations-suite/" />
<meta charset="utf-8" />
<meta name="viewport" content="width=1440, initial-scale=0.6" />
<title>Operations Suite · Kerry ConnectIO</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{--slate:#005776;--forest:#143700;--stone:#F1F1E5;--sunrise:#F9C20A;--sunset:#F24A00;--sage:#289BA2;--jade:#44CF93;--innovation:#DFFF11;--sans:"Noto Sans",system-ui,sans-serif;--mono:"IBM Plex Mono",monospace;--fg:var(--forest);--fg2:color-mix(in srgb,var(--forest) 60%,white);--fg3:color-mix(in srgb,var(--forest) 40%,white);--line:color-mix(in srgb,var(--forest) 14%,transparent);--surface:#fff;--bg:#FAFAF3;--r:6px;--r2:10px;--shadow:0 1px 3px rgba(20,55,0,.06),0 4px 16px rgba(20,55,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--sans);color:var(--fg);background:var(--bg);font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{display:flex;flex-direction:column;height:100vh}
.main{flex:1;overflow:hidden;display:flex}
.panel-scroll{flex:1;overflow-y:auto;padding:24px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:var(--forest);color:#fff;border-bottom:3px solid var(--innovation);flex-shrink:0}
.topbar-brand{display:flex;align-items:center;gap:14px}
.topbar-kk{width:28px;height:28px;background:var(--innovation);border-radius:3px;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:13px;color:var(--forest)}
.topbar-name{font-weight:700;font-size:15px;letter-spacing:.01em}
.topbar-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.7;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:20px}
.shift-badge{display:flex;align-items:center;gap:8px;padding:5px 12px;background:rgba(223,255,17,.15);border-radius:4px;border:1px solid rgba(223,255,17,.25)}
.shift-badge-lbl{font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--innovation)}
.user-chip{display:flex;align-items:center;gap:8px;padding-left:16px;border-left:1px solid rgba(255,255,255,.2)}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--innovation);color:var(--forest);font-weight:700;font-size:10px;display:grid;place-items:center}
.user-name{font-size:12px;font-weight:600}
.user-role{font-size:10px;opacity:.7}
.tab-nav{display:flex;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--line);flex-shrink:0}
.tab-btn{padding:12px 16px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg3);border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--forest);border-bottom-color:var(--forest);font-weight:600}
.tab-btn:hover:not(.active){color:var(--fg);border-bottom-color:var(--line)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line)}
.card-title{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--forest);font-weight:600}
.card-body{padding:16px}

/* kpi strip */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:16px 18px;box-shadow:var(--shadow)}
.kpi-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin-bottom:8px}
.kpi-value{font-family:var(--mono);font-size:28px;font-weight:600;line-height:1;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:var(--fg2);margin-top:3px}
.green{color:#0e5c35}.red{color:var(--sunset)}.yellow{color:#a07800}.blue{color:var(--slate)}

/* inbox */
.inbox-list{display:flex;flex-direction:column;gap:6px}
.inbox-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r);background:var(--bg);cursor:pointer;transition:border-color .15s,background .15s}
.inbox-item:hover{background:var(--surface);border-color:var(--slate)}
.inbox-item.urgent{border-left:3px solid var(--sunset);padding-left:11px}
.inbox-item.warn{border-left:3px solid var(--sunrise);padding-left:11px}
.inbox-icon{width:32px;height:32px;border-radius:var(--r);display:grid;place-items:center;font-size:16px;flex-shrink:0}
.inbox-body{flex:1}
.inbox-title{font-size:13px;font-weight:600;margin-bottom:2px}
.inbox-sub{font-size:11px;color:var(--fg2)}
.inbox-meta{display:flex;align-items:center;gap:8px;margin-top:6px}
.inbox-tag{display:inline-flex;padding:2px 7px;border-radius:999px;font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
.itag-red{background:rgba(242,74,0,.1);color:#a83500;border:1px solid rgba(242,74,0,.2)}
.itag-yellow{background:rgba(249,194,10,.1);color:#a07800;border:1px solid rgba(249,194,10,.25)}
.itag-blue{background:rgba(0,87,118,.08);color:var(--slate);border:1px solid rgba(0,87,118,.18)}
.itag-green{background:rgba(68,207,147,.1);color:#0e5c35;border:1px solid rgba(68,207,147,.2)}
.inbox-time{font-family:var(--mono);font-size:10px;color:var(--fg3);margin-left:auto}

/* line grid */
.line-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.line-card{border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}
.line-card-top{height:4px}
.line-card-body{padding:14px 16px}
.line-name{font-size:14px;font-weight:700;letter-spacing:.02em;margin-bottom:2px;text-transform:uppercase}
.line-product{font-size:11px;color:var(--fg2);margin-bottom:10px}
.line-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.line-stat{padding:8px 10px;border-right:1px solid var(--line);text-align:center}
.line-stat:last-child{border-right:none}
.line-stat-val{font-family:var(--mono);font-size:16px;font-weight:600;line-height:1}
.line-stat-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg3);margin-top:3px}
.line-status-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.line-status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.04em}
.ls-running{background:rgba(68,207,147,.12);color:#0e5c35;border:1px solid rgba(68,207,147,.25)}
.ls-changeover{background:rgba(249,194,10,.12);color:#a07800;border:1px solid rgba(249,194,10,.3)}
.ls-blocked{background:rgba(242,74,0,.1);color:#a83500;border:1px solid rgba(242,74,0,.2)}
.ls-scheduled{background:rgba(0,87,118,.08);color:var(--slate);border:1px solid rgba(0,87,118,.18)}
.progress-bar{height:6px;background:var(--line);border-radius:999px;overflow:hidden;flex:1;margin-left:10px}
.progress-fill{height:100%;border-radius:999px}

/* oee trend */
.oee-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.oee-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:16px;box-shadow:var(--shadow)}
.oee-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.oee-val{font-family:var(--mono);font-size:28px;font-weight:600;line-height:1;margin-bottom:4px}
.oee-spark{display:flex;align-items:flex-end;gap:2px;height:32px;margin-top:8px}
.oee-bar{flex:1;border-radius:2px 2px 0 0;min-height:4px;transition:height .3s}
.oee-sub{font-family:var(--mono);font-size:10px;color:var(--fg3);margin-top:4px}
.oee-delta{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px}
.delta-up{background:rgba(68,207,147,.12);color:#0e5c35}
.delta-down{background:rgba(242,74,0,.1);color:#a83500}

/* adherence table */
.adh-table{width:100%;border-collapse:collapse;font-size:12px}
.adh-table th{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg3);font-weight:500;padding:8px 12px;border-bottom:1px solid var(--line);text-align:left}
.adh-table td{padding:8px 12px;border-bottom:1px solid var(--line)}
.adh-table tr:last-child td{border-bottom:none}
.adh-bar-cell{min-width:120px}
.adh-bar-wrap{height:8px;background:var(--line);border-radius:999px;overflow:hidden}
.adh-bar-fill{height:100%;border-radius:999px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState } = React;

const INBOX = [
  { icon:"⚠", bg:"rgba(242,74,0,.1)", title:"Line 4 — late finish risk", sub:"A1-Gold 400g run is 42 min behind planned finish. Downstream changeover impact.", tag:"itag-red", tagLabel:"Urgent", time:"8 min ago", urgent:true },
  { icon:"🔄", bg:"rgba(249,194,10,.1)", title:"Changeover due — Line 2", sub:"SynerBase F11 to K-Carrageenan blend. Estimated 85 min. Crew assignment pending.", tag:"itag-yellow", tagLabel:"Action", time:"12 min ago", warn:true },
  { icon:"📦", bg:"rgba(0,87,118,.08)", title:"Material shortage alert — Line 6", sub:"K-Pectin LV40 stock below 30 min run time. Transfer request not yet created.", tag:"itag-red", tagLabel:"Urgent", time:"18 min ago", urgent:true },
  { icon:"📋", bg:"rgba(0,87,118,.08)", title:"Shift handover — B shift → C shift", sub:"Handover note submitted by J. Brennan. 3 open actions carried forward.", tag:"itag-blue", tagLabel:"Handover", time:"35 min ago" },
  { icon:"📈", bg:"rgba(68,207,147,.1)", title:"OEE milestone — Line 1", sub:"Line 1 achieved 91.2% OEE for the shift. Second-best on record for this product family.", tag:"itag-green", tagLabel:"Milestone", time:"1h 12 min ago" },
  { icon:"🔧", bg:"rgba(249,194,10,.1)", title:"Equipment fault — Line 3 sealer", sub:"Sealer jaw temperature deviation ±8°C. Maintenance ticket raised. Line running degraded.", tag:"itag-yellow", tagLabel:"Maintenance", time:"1h 28 min ago", warn:true },
  { icon:"✅", bg:"rgba(68,207,147,.1)", title:"Order PO-44832 completed", sub:"A2-Gold 400g · 12,000 units completed and released. 98.2% yield.", tag:"itag-green", tagLabel:"Complete", time:"2h 5 min ago" },
  { icon:"📊", bg:"rgba(0,87,118,.08)", title:"Daily production plan published", sub:"C shift plan for 2024-03-13. 6 lines active, 18 orders scheduled, 2 changeovers.", tag:"itag-blue", tagLabel:"Plan", time:"2h 40 min ago" },
];

const LINES = [
  { name:"Line 1", product:"A1-Gold 400g",        status:"running",    oee:91, speed:98, yield:99, order:"PO-44840", progress:0.72, color:"#44CF93" },
  { name:"Line 2", product:"Changeover",           status:"changeover", oee:0,  speed:0,  yield:null, order:"→ SynerBase F11", progress:0.45, color:"#F9C20A" },
  { name:"Line 3", product:"K-Carrageenan blend",  status:"running",    oee:74, speed:88, yield:97, order:"PO-44851", progress:0.51, color:"#F9C20A" },
  { name:"Line 4", product:"A1-Gold 400g",         status:"running",    oee:82, speed:95, yield:98, order:"PO-44831", progress:0.88, color:"#44CF93" },
  { name:"Line 5", product:"HMF Premix",           status:"running",    oee:88, speed:100,yield:99, order:"PO-44860", progress:0.35, color:"#44CF93" },
  { name:"Line 6", product:"K-Pectin LV40",        status:"blocked",    oee:0,  speed:0,  yield:null, order:"PO-44871 — material short", progress:0.0, color:"#F24A00" },
  { name:"Line 7", product:"SureBase PM20",        status:"running",    oee:86, speed:94, yield:99, order:"PO-44875", progress:0.62, color:"#44CF93" },
  { name:"Line 8", product:"Scheduled 14:00",      status:"scheduled",  oee:null,speed:null,yield:null, order:"PO-44890", progress:0, color:"#289BA2" },
  { name:"Line 9", product:"Lactase 50T blend",    status:"running",    oee:79, speed:91, yield:98, order:"PO-44895", progress:0.44, color:"#F9C20A" },
];

const OEE_LINES = [
  { name:"Line 1", val:91, delta:"+3.2", up:true,  sparks:[72,75,80,82,88,85,91] },
  { name:"Line 3", val:74, delta:"-4.1", up:false, sparks:[82,80,78,76,74,75,74] },
  { name:"Line 4", val:82, delta:"+1.4", up:true,  sparks:[78,79,80,81,82,80,82] },
  { name:"Line 5", val:88, delta:"+2.8", up:true,  sparks:[80,82,84,85,86,87,88] },
  { name:"Line 7", val:86, delta:"+0.6", up:true,  sparks:[84,85,83,86,85,86,86] },
  { name:"Line 9", val:79, delta:"-1.2", up:false, sparks:[82,81,80,80,79,80,79] },
  { name:"Avg",    val:83, delta:"+0.8", up:true,  sparks:[79,80,81,81,82,82,83] },
];

const ADHERENCE = [
  { line:"Line 1", product:"A1-Gold 400g",       planned:18000, actual:17820, pct:99, on_time:true },
  { line:"Line 3", product:"K-Carrageenan blend", planned:8000,  actual:7100,  pct:89, on_time:false },
  { line:"Line 4", product:"A1-Gold 400g",        planned:18000, actual:15200, pct:84, on_time:false },
  { line:"Line 5", product:"HMF Premix",          planned:3600,  actual:3540,  pct:98, on_time:true },
  { line:"Line 7", product:"SureBase PM20",       planned:6000,  actual:5920,  pct:99, on_time:true },
  { line:"Line 9", product:"Lactase 50T blend",   planned:2800,  actual:2660,  pct:95, on_time:true },
];

function LineStatusPill({ status }) {
  const map = { running:"ls-running", changeover:"ls-changeover", blocked:"ls-blocked", scheduled:"ls-scheduled" };
  const lbl = { running:"Running", changeover:"Changeover", blocked:"Blocked", scheduled:"Scheduled" };
  return <span className={`line-status ${map[status]||""}`}>{lbl[status]||status}</span>;
}

function InboxTab() {
  return (
    <div style={{maxWidth:900}}>
      <div className="card">
        <div className="card-head">
          <span className="card-title">Operations inbox</span>
          <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--fg3)"}}>{INBOX.length} items · C shift</span>
        </div>
        <div className="card-body" style={{padding:"12px 14px"}}>
          <div className="inbox-list">
            {INBOX.map((item, i) => (
              <div key={i} className={`inbox-item${item.urgent?" urgent":item.warn?" warn":""}`}>
                <div className="inbox-icon" style={{background:item.bg}}>{item.icon}</div>
                <div className="inbox-body">
                  <div className="inbox-title">{item.title}</div>
                  <div className="inbox-sub">{item.sub}</div>
                  <div className="inbox-meta">
                    <span className={`inbox-tag ${item.tag}`}>{item.tagLabel}</span>
                    <span className="inbox-time">{item.time}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function LinesTab() {
  return (
    <div style={{maxWidth:1200}}>
      <div className="kpi-strip" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
        <div className="kpi"><div className="kpi-label">Lines active</div><div className="kpi-value green">6</div><div className="kpi-sub">of 9 scheduled</div></div>
        <div className="kpi"><div className="kpi-label">Lines blocked</div><div className="kpi-value red">1</div><div className="kpi-sub">Line 6 — material</div></div>
        <div className="kpi"><div className="kpi-label">Changeovers</div><div className="kpi-value yellow">1</div><div className="kpi-sub">Line 2 — 85 min est.</div></div>
        <div className="kpi"><div className="kpi-label">Avg OEE</div><div className="kpi-value green">83%</div><div className="kpi-sub">+0.8% vs yesterday</div></div>
      </div>
      <div className="line-grid">
        {LINES.map(l => (
          <div key={l.name} className="line-card">
            <div className="line-card-top" style={{background:l.color}} />
            <div className="line-card-body">
              <div className="line-name">{l.name}</div>
              <div className="line-product">{l.product}</div>
              {l.oee !== null && l.oee > 0 ? (
                <div className="line-stats">
                  <div className="line-stat">
                    <div className="line-stat-val" style={{color:l.oee>=85?"#0e5c35":l.oee>=75?"#a07800":"var(--sunset)"}}>{l.oee}%</div>
                    <div className="line-stat-lbl">OEE</div>
                  </div>
                  <div className="line-stat">
                    <div className="line-stat-val">{l.speed}%</div>
                    <div className="line-stat-lbl">Speed</div>
                  </div>
                  <div className="line-stat">
                    <div className="line-stat-val">{l.yield}%</div>
                    <div className="line-stat-lbl">Yield</div>
                  </div>
                </div>
              ) : (
                <div style={{height:50,display:"grid",placeItems:"center",color:"var(--fg3)",fontFamily:"var(--mono)",fontSize:11,letterSpacing:".06em",background:"var(--bg)",borderRadius:"var(--r)",border:"1px solid var(--line)"}}>
                  {l.status === "blocked" ? "⛌ Blocked — material shortage" : l.status === "changeover" ? "⟳ Changeover in progress" : "⏱ Scheduled"}
                </div>
              )}
              <div className="line-status-row">
                <LineStatusPill status={l.status} />
                {l.progress > 0 && (
                  <>
                    <div className="progress-bar"><div className="progress-fill" style={{width:(l.progress*100)+"%",background:l.color}} /></div>
                    <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--fg3)",marginLeft:6,minWidth:30}}>{Math.round(l.progress*100)}%</span>
                  </>
                )}
              </div>
              <div style={{marginTop:8,fontFamily:"var(--mono)",fontSize:10,color:"var(--fg3)"}}>{l.order}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function OEETab() {
  return (
    <div style={{maxWidth:1200}}>
      <div className="oee-grid">
        {OEE_LINES.map(l => {
          const maxS = Math.max(...l.sparks);
          return (
            <div key={l.name} className="oee-card">
              <div className="oee-name">{l.name}</div>
              <div className="oee-val" style={{color:l.val>=85?"#0e5c35":l.val>=75?"#a07800":"var(--sunset)"}}>{l.val}%</div>
              <span className={`oee-delta ${l.up?"delta-up":"delta-down"}`}>{l.delta}%</span>
              <div className="oee-spark">
                {l.sparks.map((v,i) => (
                  <div key={i} className="oee-bar"
                       style={{height:((v/maxS)*100)+"%",background:l.val>=85?"var(--jade)":l.val>=75?"var(--sunrise)":"var(--sunset)",opacity:i===l.sparks.length-1?1:0.45+i*0.08}} />
                ))}
              </div>
              <div className="oee-sub">7-shift trend</div>
            </div>
          );
        })}
      </div>
      <div className="card" style={{marginTop:16}}>
        <div className="card-head"><span className="card-title">Schedule adherence · C shift</span></div>
        <table className="adh-table">
          <thead><tr><th>Line</th><th>Product</th><th>Planned (units)</th><th>Actual</th><th>Adherence</th><th>On time</th></tr></thead>
          <tbody>
            {ADHERENCE.map(r => (
              <tr key={r.line}>
                <td style={{fontWeight:700}}>{r.line}</td>
                <td style={{color:"var(--fg2)"}}>{r.product}</td>
                <td style={{fontFamily:"var(--mono)"}}>{r.planned.toLocaleString()}</td>
                <td style={{fontFamily:"var(--mono)"}}>{r.actual.toLocaleString()}</td>
                <td className="adh-bar-cell">
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div className="adh-bar-wrap" style={{width:100}}>
                      <div className="adh-bar-fill" style={{width:r.pct+"%",background:r.pct>=95?"var(--jade)":r.pct>=85?"var(--sunrise)":"var(--sunset)"}} />
                    </div>
                    <span style={{fontFamily:"var(--mono)",fontSize:11,minWidth:32}}>{r.pct}%</span>
                  </div>
                </td>
                <td><span style={{fontFamily:"var(--mono)",fontSize:11,color:r.on_time?"#0e5c35":"var(--sunset)",fontWeight:600}}>{r.on_time?"✓ On time":"✗ Late"}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

const TABS = [
  { id:"inbox",  label:"Inbox" },
  { id:"lines",  label:"Live Lines" },
