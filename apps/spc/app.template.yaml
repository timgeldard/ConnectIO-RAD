# Databricks Apps configuration
# Note: auth_type and requested_scopes are configured via the App Settings UI (User authorization)
command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: DATABRICKS_WAREHOUSE_HTTP_PATH
    value: "${DATABRICKS_WAREHOUSE_HTTP_PATH}"

  - name: TRACE_CATALOG
    value: "${TRACE_CATALOG}"

  - name: TRACE_SCHEMA
    value: "${TRACE_SCHEMA}"

  - name: GENIE_SPACE_ID
    value: "${GENIE_SPACE_ID}"

  - name: APP_TRUST_X_FORWARDED_HOST
    value: "true"

  # Readiness probe token — MUST come from a Databricks secret scope, not a
  # literal value. Canonical pattern (uncomment and adjust scope/key):
  #
  # - name: DATABRICKS_READINESS_TOKEN
  #   valueFrom: spc-app/readiness_token
  #
  # See docs/OPS.md for scope creation, rotation, and the `make deploy`
  # preflight that verifies the app can read the secret.
