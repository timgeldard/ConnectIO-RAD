[app]
name = "spc"
bundle_name = "spc"
default_profile = "uat"
default_target = "uat"
template = "app.template.yaml"
config_output = "app.yaml"

[build]
cwd = "."
command = "python3 scripts/build.py"

[bundle]
include_target = false

[post_deploy]
enabled = true
source_target = "profile"
repair_sql_scope = true

[[migrations]]
name = "spc_locked_limits"
file = "scripts/migrations/000_setup_locked_limits.sql"
warehouse_id_env = "DATABRICKS_WAREHOUSE_ID"

