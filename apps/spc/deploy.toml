[app]
name = "spc-tim"
bundle_name = "spc-tim"
default_profile = "uat"
template = "app.template.yaml"
config_output = "app.yaml"

[build]
cwd = "."
command = "python3 scripts/build.py"

[bundle]
include_target = false

[post_deploy]
enabled = true
source_target = "profile"
repair_sql_scope = true

[commands]
# `requires_tool = "make"` lets Windows local deploys skip these idempotent
# SQL setup hooks cleanly. Linux/CI runners with `make` installed still execute
# them, and any genuine failure there continues to abort the deploy.
after_bundle = [
  { command = "make setup-locked-limits PROFILE={profile}", requires_tool = "make" },
  { command = "make setup-exclusions PROFILE={profile}", requires_tool = "make" },
  { command = "make setup-query-audit PROFILE={profile}", requires_tool = "make" },
  { command = "make setup-operation-id-locked-limits PROFILE={profile}", requires_tool = "make" },
  { command = "make setup-operation-id-exclusions PROFILE={profile}", requires_tool = "make" },
  { command = "make setup-locked-limits-unified-key PROFILE={profile}", requires_tool = "make" },
  { command = "make setup-metric-views PROFILE={profile}", requires_tool = "make" },
  { command = "make setup-unified-mic-views PROFILE={profile}", requires_tool = "make" },
  { command = "make setup-mic-chart-config PROFILE={profile}", requires_tool = "make" },
]

[profiles.uat.env]
DATABRICKS_WAREHOUSE_HTTP_PATH = "/sql/1.0/warehouses/e76480b94bea6ed5"
TRACE_CATALOG = "connected_plant_uat"
TRACE_SCHEMA = "gold"

[profiles.prod.env]
DATABRICKS_WAREHOUSE_HTTP_PATH = ""
TRACE_CATALOG = ""
TRACE_SCHEMA = "gold"
