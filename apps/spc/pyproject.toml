[tool.pytest.ini_options]
testpaths = ["backend/tests"]
python_files = ["test_*.py"]
addopts = "-q --cov=spc_backend --cov-report=term-missing --cov-fail-under=75"
asyncio_mode = "auto"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["spc_backend"]
omit = ["backend/tests/*", "spc_backend/__init__.py"]
