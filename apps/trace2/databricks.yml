bundle:
  name: trace2
  databricks_cli_version: '>= 0.283.0'

sync:
  include:
    - app.yaml
    - frontend/dist/**
    - shared_db/**
    - shared_api/**
    - shared_geo/**
    - shared_trace/**

variables:
  app_name:
    default: trace2
  warehouse_http_path:
    default: /sql/1.0/warehouses/e76480b94bea6ed5
  trace_catalog:
    default: connected_plant_uat
  trace_schema:
    default: gold
  budget_policy_id:
    default: ""

targets:
  uat:
    default: true
    variables:
      budget_policy_id: "86045e18-f119-4a18-bc16-b533069ebbec"
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
  prod:
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    # Set budget_policy_id to the prod workspace policy value before deploying to prod.

resources:
  apps:
    trace2:
      name: ${var.app_name}
      description: Batch Traceability app powered by Databricks
      budget_policy_id: ${var.budget_policy_id}
      source_code_path: .
      # user_api_scopes is applied via repair_sql_scope=true in deploy.toml, not here.
      # The deploy flow uses scripts/deploy_app.py (never bundle run), so declaring
      # user_api_scopes in databricks.yml has no effect on the running app.
      #
      # Configure DATABRICKS_READINESS_TOKEN in each deployed environment if
      # `/api/ready` should perform a real SQL warehouse probe before traffic.
