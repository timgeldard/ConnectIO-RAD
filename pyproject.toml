[tool.uv.workspace]
members = [
  "apps/spc/backend",
  "apps/envmon/backend",
  "apps/trace2/backend",
  "apps/warehouse360/backend",
  "libs/shared-api",
  "libs/shared-auth",
  "libs/shared-db",
  "libs/shared-geo",
  "libs/shared-trace",
]

[tool.uv.sources]
shared-db   = { workspace = true }
shared-auth = { workspace = true }
shared-api  = { workspace = true }
shared-geo  = { workspace = true }
shared-trace = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.uv]
dev-dependencies = [
  "httpx>=0.27",
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5",
  "hypothesis>=6.100",
  "ruff>=0.4",
  "mypy>=1.10",
]
